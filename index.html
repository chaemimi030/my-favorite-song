<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J-POP Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
            background-color: #F5F5F7;
            color: #1D1D1F;
            -webkit-tap-highlight-color: transparent;
        }

        .apple-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-input {
            background: #F2F2F7;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }

        .apple-input:focus {
            background: #E5E5EA;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .btn-primary {
            background: #007AFF;
            color: white;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.1s ease;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .badge-tj { background: #FF3B30; color: white; }
        .badge-ky { background: #34C759; color: white; }

        /* Smooth animation for list */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .song-item { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 px-6 py-4 bg-[#F5F5F7]/80 backdrop-blur-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">My J-POP</h1>
            <button onclick="toggleModal()" class="w-10 h-10 bg-black text-white rounded-full flex items-center justify-center">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </header>

    <main class="px-6 max-w-md mx-auto mt-4">
        <div class="mb-6">
            <input type="text" id="searchInput" onkeyup="renderSongs()" placeholder="곡명, 가수 검색..." class="apple-input shadow-sm">
        </div>

        <div id="songList" class="space-y-4">
            </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[30px] p-8 max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <h2 class="text-xl font-bold mb-6">노래 추가하기</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-gray-500 ml-1">곡 제목 (일본어/원어)</label>
                    <input type="text" id="titleJP" class="apple-input" placeholder="例: 怪獣の花唄">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500 ml-1">곡 제목 (한국어)</label>
                    <input type="text" id="titleKR" class="apple-input" placeholder="괴수의 화노래">
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500 ml-1">가수</label>
                    <input type="text" id="artist" class="apple-input" placeholder="Vaundy">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 ml-1">TJ 번호</label>
                        <input type="number" id="noTJ" class="apple-input" placeholder="번호">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 ml-1">금영 번호</label>
                        <input type="number" id="noKY" class="apple-input" placeholder="번호">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-gray-500 ml-1">가사 및 발음 (메모)</label>
                    <textarea id="lyrics" class="apple-input h-24" placeholder="무네니 히비쿠..."></textarea>
                </div>
                <button onclick="addSong()" class="w-full py-4 btn-primary mt-4">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        let songs = JSON.parse(localStorage.getItem('jpop-songs')) || [];

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.toggle('hidden');
            if(modal.classList.contains('hidden')) resetForm();
        }

        function resetForm() {
            document.querySelectorAll('.apple-input').forEach(input => input.value = '');
        }

        function addSong() {
            const song = {
                id: Date.now(),
                titleJP: document.getElementById('titleJP').value,
                titleKR: document.getElementById('titleKR').value,
                artist: document.getElementById('artist').value,
                noTJ: document.getElementById('noTJ').value || '-',
                noKY: document.getElementById('noKY').value || '-',
                lyrics: document.getElementById('lyrics').value
            };

            if(!song.titleJP || !song.artist) {
                alert('제목과 가수는 필수입니다!');
                return;
            }

            songs.unshift(song);
            saveAndRender();
            toggleModal();
        }

        function deleteSong(id) {
            if(confirm('정말 삭제하시겠습니까?')) {
                songs = songs.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('jpop-songs', JSON.stringify(songs));
            renderSongs();
        }

        function renderSongs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('songList');
            container.innerHTML = '';

            const filteredSongs = songs.filter(s => 
                s.titleJP.toLowerCase().includes(searchTerm) || 
                s.titleKR.toLowerCase().includes(searchTerm) || 
                s.artist.toLowerCase().includes(searchTerm)
            );

            filteredSongs.forEach(song => {
                container.innerHTML += `
                    <div class="apple-card p-5 song-item relative group">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">${song.titleJP}</h3>
                                <p class="text-sm text-gray-500">${song.titleKR} · ${song.artist}</p>
                            </div>
                            <button onclick="deleteSong(${song.id})" class="text-gray-300 hover:text-red-500 transition-colors">
                                <i class="fas fa-times-circle"></i>
                            </button>
                        </div>
                        
                        <div class="flex gap-2 my-3">
                            <div class="badge-tj px-3 py-1 rounded-full text-xs font-bold">TJ ${song.noTJ}</div>
                            <div class="badge-ky px-3 py-1 rounded-full text-xs font-bold">KY ${song.noKY}</div>
                        </div>

                        ${song.lyrics ? `
                        <div class="mt-3 p-3 bg-white/50 rounded-lg text-sm text-gray-600 leading-relaxed italic">
                            ${song.lyrics.replace(/\n/g, '<br>')}
                        </div>` : ''}
                    </div>
                `;
            });

            if(filteredSongs.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">등록된 곡이 없거나<br>검색 결과가 없습니다.</div>`;
            }
        }

        // Initial Render
        renderSongs();
    </script>
</body>
</html>
