<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karaoke Pro v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --apple-blue: #007AFF;
            --apple-bg: #F2F2F7;
        }

        /* [성능최적화] GPU 가속을 위해 transform 위주 애니메이션 사용 */
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--apple-bg);
            color: #1C1C1E;
            overscroll-behavior-y: none; /* 바운스 효과 억제하여 버벅임 방지 */
        }

        /* [성능최적화] Backdrop-filter는 부하가 크므로 꼭 필요한 곳에만 최소한으로 적용 */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(242, 242, 247, 0.8);
            backdrop-filter: saturate(180%) blur(15px);
            -webkit-backdrop-filter: saturate(180%) blur(15px);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            color: #8E8E93;
            font-size: 10px;
            transition: color 0.1s ease;
        }
        .nav-item.active { color: var(--apple-blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

        /* [성능최적화] 팝업 애니메이션 최적화 */
        .lyric-view {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            transform: translate3d(0, 100%, 0); /* 3D 가속 적용 */
            transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1);
            will-change: transform;
        }
        .lyric-view.active { transform: translate3d(0, 0, 0); }

        .rich-content {
            white-space: pre-wrap;
            word-break: break-all;
            -webkit-overflow-scrolling: touch; /* 부드러운 스크롤 */
        }

        .song-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-user-drag: none;
        }
        
        /* [성능최적화] active 효과 시 그림자 대신 투명도 조절로 부하 감소 */
        .song-card:active { opacity: 0.7; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #lyricsEditor {
            min-height: 200px;
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            outline: none;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="tab-home" class="tab-content active">
        <header class="glass-header px-5 pt-8 pb-4">
            <h1 class="text-3xl font-bold mb-4">Archives</h1>
            <div class="flex items-center bg-gray-200/50 rounded-lg px-3 py-2">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" id="searchInput" oninput="debounceRender()" placeholder="제목 또는 가수 검색" class="bg-transparent border-none outline-none w-full text-base">
            </div>
            <div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar py-1" id="filterBar">
                <button onclick="setFilter('ALL')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-black text-white">전체</button>
                <button onclick="setFilter('J-POP')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">J-POP</button>
                <button onclick="setFilter('K-POP')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">K-POP</button>
                <button onclick="setFilter('FAV')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">즐겨찾기</button>
            </div>
        </header>
        <main class="px-5 pt-4 pb-24" id="mainList"></main>
    </div>

    <div id="tab-add" class="tab-content px-6 pt-12 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">노래 추가</h2>
            <div class="flex p-1 bg-gray-200 rounded-lg">
                <button id="genreJ" onclick="toggleFormGenre('J-POP')" class="px-3 py-1 rounded-md text-xs font-bold bg-white shadow-sm">J-POP</button>
                <button id="genreK" onclick="toggleFormGenre('K-POP')" class="px-3 py-1 rounded-md text-xs font-bold text-gray-500">K-POP</button>
            </div>
        </div>
        <div class="space-y-4">
            <input type="text" id="inTitle" class="w-full p-4 rounded-xl border-none bg-white shadow-sm" placeholder="제목">
            <input type="text" id="inArtist" class="w-full p-4 rounded-xl border-none bg-white shadow-sm" placeholder="가수명">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="inTJ" class="p-4 rounded-xl border-none bg-white shadow-sm" placeholder="TJ 번호">
                <input type="text" id="inKY" class="p-4 rounded-xl border-none bg-white shadow-sm" placeholder="KY 번호">
            </div>
            <div id="lyricsEditor" contenteditable="true" placeholder="가사를 붙여넣으세요 (색상 유지)" class="shadow-sm"></div>
            <button onclick="saveSong()" class="w-full py-4 bg-blue-500 text-white rounded-2xl font-bold text-lg active:opacity-80">저장</button>
        </div>
    </div>

    <div id="tab-more" class="tab-content px-6 pt-12">
        <h2 class="text-2xl font-bold mb-6">설정</h2>
        <div class="bg-white rounded-2xl overflow-hidden shadow-sm">
            <div onclick="exportData()" class="p-4 border-b flex justify-between items-center active:bg-gray-50">
                <span>데이터 백업</span>
                <i class="fas fa-download text-gray-300"></i>
            </div>
            <label class="p-4 border-b flex justify-between items-center active:bg-gray-50 cursor-pointer">
                <span>데이터 복구</span>
                <input type="file" onchange="importData(this)" class="hidden">
                <i class="fas fa-upload text-gray-300"></i>
            </label>
            <div onclick="clearAllData()" class="p-4 flex justify-between items-center text-red-500 active:bg-gray-50">
                <span>전체 초기화</span>
                <i class="fas fa-trash-alt"></i>
            </div>
        </div>
    </div>

    <div id="lyricPopup" class="lyric-view">
        <header class="px-5 pt-8 pb-4 border-b flex justify-between items-center bg-white">
            <button onclick="closeLyrics()" class="text-blue-500 font-semibold">닫기</button>
            <div class="text-center overflow-hidden px-4">
                <h3 id="popTitle" class="font-bold truncate text-sm"></h3>
                <p id="popArtist" class="text-[10px] text-gray-400 truncate"></p>
            </div>
            <button id="popFavBtn" class="text-2xl transition-colors"><i class="fas fa-star"></i></button>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto p-6 rich-content text-[18px] leading-relaxed"></div>
        <div class="p-5 border-t bg-gray-50 grid grid-cols-2 gap-4">
            <div class="bg-white p-3 rounded-xl text-center shadow-sm">
                <span class="block text-[10px] font-bold text-red-500 mb-1">TJ</span>
                <span id="popTJ" class="text-xl font-black italic"></span>
            </div>
            <div class="bg-white p-3 rounded-xl text-center shadow-sm">
                <span class="block text-[10px] font-bold text-green-500 mb-1">KY</span>
                <span id="popKY" class="text-xl font-black italic"></span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-music"></i>리스트</div>
        <div class="nav-item" onclick="switchTab('add', this)"><i class="fas fa-plus-circle"></i>추가</div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-cog"></i>설정</div>
    </nav>

    <script>
        let songs = JSON.parse(localStorage.getItem('karaoke_pro_v2_1')) || [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';
        let renderTimer;

        // [성능최적화] 디바운싱: 타이핑 할 때마다 렌더링하지 않고 멈춘 후 0.2초 뒤에 실행
        function debounceRender() {
            clearTimeout(renderTimer);
            renderTimer = setTimeout(renderList, 200);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tabId === 'home') renderList();
        }

        function toggleFormGenre(g) {
            formGenre = g;
            document.getElementById('genreJ').className = g === 'J-POP' ? 'px-3 py-1 rounded-md text-xs font-bold bg-white shadow-sm' : 'px-3 py-1 rounded-md text-xs font-bold text-gray-500';
            document.getElementById('genreK').className = g === 'K-POP' ? 'px-3 py-1 rounded-md text-xs font-bold bg-white shadow-sm' : 'px-3 py-1 rounded-md text-xs font-bold text-gray-500';
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            const lyrics = document.getElementById('lyricsEditor').innerHTML;

            if(!title || !artist) return alert('제목과 가수는 필수입니다.');

            songs.unshift({
                id: Date.now(),
                genre: formGenre,
                title, artist,
                tj: document.getElementById('inTJ').value || '-',
                ky: document.getElementById('inKY').value || '-',
                lyrics,
                fav: false
            });

            localStorage.setItem('karaoke_pro_v2_1', JSON.stringify(songs));
            alert('저장되었습니다.');
            location.reload(); // [최적화] 메모리 정리를 위해 깔끔하게 새로고침
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = 'filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold ' + 
                    (btn.innerText.includes(f) || (f === 'ALL' && btn.innerText === '전체') ? 'bg-black text-white' : 'bg-white text-gray-500 border');
            });
            renderList();
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('mainList');
            
            // [성능최적화] DocumentFragment를 사용하여 DOM 조작 최소화
            const fragment = document.createDocumentFragment();
            
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });

            container.innerHTML = '';
            
            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400">데이터가 없습니다.</div>`;
                return;
            }

            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card shadow-sm active:scale-95 transition-transform';
                card.onclick = () => showLyrics(s.id);
                card.innerHTML = `
                    <div class="overflow-hidden mr-4">
                        <h4 class="font-bold text-[17px] truncate">${s.title}</h4>
                        <p class="text-[12px] text-gray-400 truncate">${s.artist} · <span class="text-blue-500">${s.genre}</span></p>
                    </div>
                    <div class="shrink-0 text-right">
                        <div class="text-[11px] font-black italic text-red-500">${s.tj}</div>
                        <div class="text-[11px] font-black italic text-green-600">${s.ky}</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = song.artist;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics;
            
            const favBtn = document.getElementById('popFavBtn');
            favBtn.style.color = song.fav ? '#FFCC00' : '#E5E5EA';
            favBtn.onclick = () => {
                song.fav = !song.fav;
                localStorage.setItem('karaoke_pro_v2_1', JSON.stringify(songs));
                favBtn.style.color = song.fav ? '#FFCC00' : '#E5E5EA';
            };

            document.getElementById('lyricPopup').classList.add('active');
        }

        function closeLyrics() {
            document.getElementById('lyricPopup').classList.remove('active');
        }

        function clearAllData() {
            if(confirm('정말 모든 데이터를 삭제할까요?')) {
                localStorage.removeItem('karaoke_pro_v2_1');
                location.reload();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(songs)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'karaoke_backup.json';
            a.click();
        }

        function importData(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                songs = JSON.parse(e.target.result);
                localStorage.setItem('karaoke_pro_v2_1', JSON.stringify(songs));
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }

        // 초기 실행
        renderList();
    </script>
</body>
</html>
