<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My 노래방</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.thenounproject.com/png/music-app-icon-2849414-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --ios-bg: #FFFFFF;
            --ios-header-bg: rgba(255, 255, 255, 0.98);
            --cool-gray-bg: #F2F4F7;
            --cool-gray-dark: #E5E8EB;
            --ios-text: #1C1E21;
            --ios-subtext: #8E96A3;
            --ios-heart: #FF8787;
            --side-padding: 24px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--ios-bg); color: var(--ios-text); }

        .tab-content { display: none; flex-direction: column; height: 100vh; width: 100%; }
        .tab-content.active { display: flex; }

        .header-section { flex-shrink: 0; background: var(--ios-header-bg); border-bottom: 0.5px solid var(--cool-gray-dark); padding-top: env(safe-area-inset-top); }
        .header-main { padding: 20px var(--side-padding) 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 28px; font-weight: 800; }
        
        .scroll-body { flex: 1; overflow-y: auto; padding: 20px var(--side-padding) 140px; -webkit-overflow-scrolling: touch; }

        .search-box { background: var(--cool-gray-bg); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; margin: 0 var(--side-padding) 12px; }
        .category-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 var(--side-padding) 15px; }
        .filter-pill { flex: 0 0 65px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 16px; font-size: 13px; font-weight: 600; background: var(--cool-gray-bg); color: var(--ios-subtext); border: none; }
        .filter-pill.active { background: var(--ios-text); color: #fff; }

        .song-card { background: var(--cool-gray-bg); border-radius: 20px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .num-label { font-size: 10px; color: var(--ios-subtext); font-weight: 700; margin-right: 3px; }
        .num-val { font-size: 13px; color: #000; font-weight: 800; font-style: italic; }

        /* 입력 폼 및 툴바 */
        .ios-input { background: var(--cool-gray-bg); border-radius: 14px; padding: 16px; width: 100%; outline: none; border: none; font-size: 16px; margin-bottom: 10px; }
        .pro-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
        .tool-btn { background: #fff; border: 1px solid var(--cool-gray-dark); border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #lyricsEditor { height: 280px; background: var(--cool-gray-bg); border-radius: 18px; padding: 20px; outline: none; font-size: 14px !important; line-height: 1.6; overflow-y: auto; }

        /* 하단 네비게이션 */
        .nav-holder { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 24px calc(15px + env(safe-area-inset-bottom)); background: linear-gradient(transparent, #fff 50%); pointer-events: none; }
        .bottom-nav { background: #1C1E21; border-radius: 24px; display: flex; padding: 6px; pointer-events: auto; }
        .nav-item { flex: 1; padding: 14px 0; text-align: center; color: #777; border-radius: 20px; font-size: 18px; cursor: pointer; }
        .nav-item.active { background: #fff; color: #000; }

        /* [개선] 가사 팝업 - 상단 여백 추가 */
        .slide-up { 
            position: fixed; inset: 0; background: #fff; z-index: 3000; 
            transform: translate3d(0, 100%, 0); 
            border-radius: 30px 30px 0 0; 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        /* 팝업이 뜰 때 80px 여백을 두어 'MY 노래방'이 보이게 함 */
        .slide-up.active { transform: translate3d(0, 80px, 0); }
        
        .popup-handle-area { width: 100%; padding: 15px 0 10px; cursor: grab; flex-shrink: 0; }
        .popup-handle { width: 36px; height: 5px; background: #E5E5EA; border-radius: 10px; margin: 0 auto; }
        #popContent { font-size: 14px !important; line-height: 1.8; -webkit-user-select: text; user-select: text; }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 14px; z-index: 4000; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body onload="initApp()">

    <div id="toast">가사가 복사되었습니다!</div>

    <section id="tab-home" class="tab-content active">
        <header class="header-section">
            <div class="header-main">
                <h1 class="header-title">My 노래방</h1>
                <button onclick="toggleEditMode()" class="edit-btn text-[#007AFF] font-bold">편집</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" id="searchInput" oninput="renderList()" placeholder="제목, 가수 검색" class="bg-transparent border-none outline-none w-full">
            </div>
            <div class="category-scroll">
                <button onclick="setFilter('FAV')" id="pill-FAV" class="filter-pill"><i class="fas fa-heart text-[var(--ios-heart)]"></i></button>
                <button onclick="setFilter('ALL')" id="pill-ALL" class="filter-pill active">전체</button>
                <button onclick="setFilter('J-POP')" id="pill-J-POP" class="filter-pill">J-POP</button>
                <button onclick="setFilter('K-POP')" id="pill-K-POP" class="filter-pill">K-POP</button>
                <button onclick="setFilter('ETC')" id="pill-ETC" class="filter-pill">기타</button>
            </div>
        </header>
        <div class="scroll-body" id="mainList"></div>
    </section>

    <section id="tab-add" class="tab-content">
        <header class="header-section">
            <div class="header-main"><h1 id="add-page-title" class="header-title">곡 추가</h1></div>
        </header>
        <div class="scroll-body">
            <div class="flex p-1 bg-[#F0F2F5] rounded-2xl mb-6">
                <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm">J-POP</button>
                <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">K-POP</button>
                <button onclick="setFormGenre('ETC')" id="btnE" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">기타</button>
            </div>
            <input type="hidden" id="editingId">
            <input type="text" id="inTitle" class="ios-input" placeholder="제목">
            <input type="text" id="inArtist" class="ios-input" placeholder="가수명">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="inTJ" class="ios-input" placeholder="TJ 번호">
                <input type="text" id="inKY" class="ios-input" placeholder="KY 번호">
            </div>
            <div class="pro-toolbar">
                <button onmousedown="event.preventDefault(); execCmd('bold')" class="tool-btn"><i class="fas fa-bold"></i></button>
                <button onmousedown="event.preventDefault(); execCmd('foreColor', '#FF8787')" class="tool-btn"><div class="w-5 h-5 rounded bg-[#FF8787]"></div></button>
                <button onmousedown="event.preventDefault(); execCmd('hiliteColor', '#FEF08A')" class="tool-btn"><i class="fas fa-highlighter text-[#EAB308]"></i></button>
                <button onmousedown="event.preventDefault(); execCmd('removeFormat')" class="tool-btn"><i class="fas fa-eraser"></i></button>
            </div>
            <div id="lyricsEditor" contenteditable="true" placeholder="가사를 입력하세요..."></div>
            <button onclick="saveSong()" id="saveBtn" class="w-full py-5 bg-[#1C1E21] text-white rounded-3xl font-bold text-xl mt-6">저장하기</button>
        </div>
    </section>

    <section id="tab-more" class="tab-content">
        <header class="header-section">
            <div class="header-main"><h1 class="header-title">설정</h1></div>
        </header>
        <div class="scroll-body">
            <div onclick="exportData()" class="ios-input cursor-pointer flex justify-between">데이터 백업 <i class="fas fa-download"></i></div>
            <div class="pt-20 text-center opacity-20 text-[10px] uppercase font-bold tracking-widest">v10.8 Pop-up Stable</div>
        </div>
    </section>

    <div class="nav-holder">
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home', 0)"><i class="fas fa-house"></i></div>
            <div class="nav-item" onclick="switchTab('add', 1)"><i class="fas fa-plus"></i></div>
            <div class="nav-item" onclick="switchTab('more', 2)"><i class="fas fa-gear"></i></div>
        </nav>
    </div>

    <div id="lyricPopup" class="slide-up flex flex-col">
        <div class="popup-handle-area" id="popHandle"><div class="popup-handle"></div></div>
        <header class="px-8 py-2 flex justify-between items-center shrink-0">
            <div class="flex-1 overflow-hidden">
                <h3 id="popTitle" class="font-bold text-2xl truncate"></h3>
                <p id="popArtist" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="copyAndSelectAll()" class="text-gray-400 text-xl"><i class="fas fa-copy"></i></button>
                <button id="popEditBtn" class="text-gray-400 text-xl"><i class="fas fa-pen"></i></button>
                <button id="popFavBtn" class="text-2xl"><i class="fas fa-heart"></i></button>
            </div>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto px-8 py-6"></div>
        <div class="px-8 py-6 bg-gray-50 flex gap-4 pb-24 shrink-0">
            <div class="flex-1 text-center"><span class="num-label">TJ</span><span id="popTJ" class="num-val"></span></div>
            <div class="flex-1 text-center border-l"><span class="num-label">KY</span><span id="popKY" class="num-val"></span></div>
        </div>
    </div>

    <script>
        let songs = [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';

        function initApp() {
            songs = JSON.parse(localStorage.getItem('karaoke_v5_data')) || [];
            renderList();
            setupPopupGesture();
        }

        function switchTab(tabId, idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });
            container.innerHTML = filtered.length ? '' : '<div class="text-center py-20 opacity-20 font-bold italic">결과가 없습니다.</div>';
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => showLyrics(s.id);
                card.innerHTML = `<div class="flex-1 overflow-hidden pr-4 min-w-0">
                    <div class="flex items-center gap-1.5">${s.fav?'<i class="fas fa-heart text-[var(--ios-heart)] text-[10px]"></i>':''}<h4 class="font-bold text-lg truncate">${s.title}</h4></div>
                    <p class="text-xs text-gray-400 mt-1 truncate">${s.artist}</p>
                </div><div class="shrink-0 text-right"><div><span class="num-label">TJ</span><span class="num-val">${s.tj}</span></div><div><span class="num-label">KY</span><span class="num-val">${s.ky}</span></div></div>`;
                container.appendChild(card);
            });
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} • ${song.genre}`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics || '가사가 없습니다.';
            document.getElementById('popFavBtn').style.color = song.fav ? '#FF8787' : '#E5E5EA';
            document.getElementById('lyricPopup').classList.add('active');
        }

        function setupPopupGesture() {
            let startY = 0;
            const popup = document.getElementById('lyricPopup');
            const content = document.getElementById('popContent');
            const handle = document.getElementById('popHandle');

            // 핸들 부분을 잡고 내릴 때만 닫기
            handle.addEventListener('touchstart', (e) => startY = e.touches[0].clientY);
            handle.addEventListener('touchend', (e) => {
                if(e.changedTouches[0].clientY - startY > 50) popup.classList.remove('active');
            });

            // 가사 영역 스크롤 시 창 닫힘 방지
            popup.addEventListener('touchstart', (e) => startY = e.touches[0].clientY);
            popup.addEventListener('touchend', (e) => {
                const distance = e.changedTouches[0].clientY - startY;
                // 가사 스크롤이 맨 위에 있고, 강하게 아래로 쓸어내릴 때만 닫기
                if(content.scrollTop <= 0 && distance > 100) popup.classList.remove('active');
            });
        }

        async function copyAndSelectAll() {
            const content = document.getElementById('popContent');
            const range = document.createRange();
            range.selectNodeContents(content);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            try { await navigator.clipboard.writeText(content.innerText); } catch(e) { document.execCommand('copy'); }
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            if(!title || !artist) return alert('제목과 가수는 필수입니다.');
            const data = {
                id: Date.now(), genre: formGenre, title, artist, 
                tj: document.getElementById('inTJ').value || '-', ky: document.getElementById('inKY').value || '-',
                lyrics: document.getElementById('lyricsEditor').innerHTML, fav: false
            };
            songs.unshift(data);
            localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
            location.reload();
        }

        function setFormGenre(g) {
            formGenre = g;
            ['btnJ', 'btnK', 'btnE'].forEach(id => document.getElementById(id).className = 'flex-1 py-3 rounded-xl text-xs font-bold text-gray-400');
            const target = g === 'J-POP' ? 'btnJ' : (g === 'K-POP' ? 'btnK' : 'btnE');
            document.getElementById(target).className = 'flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm';
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.toggle('active', btn.id === 'pill-'+f));
            renderList();
        }

        function execCmd(c,v=null) { document.getElementById('lyricsEditor').focus(); document.execCommand(c, false, v); }
    </script>
</body>
</html>
