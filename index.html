<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My 노래방</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/wired/180/FF8787/headphones.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        :root {
            --ios-bg: #FFFFFF;
            --ios-header-bg: rgba(255, 255, 255, 0.95);
            --cool-gray-bg: #F2F4F7;
            --cool-gray-dark: #E5E8EB;
            --ios-text: #1C1E21;
            --ios-subtext: #8E96A3;
            --ios-heart: #FF8787;
            --side-padding: 24px;
            /* 탭별 고정 높이 정의 */
            --header-home: 195px;
            --header-sub: 90px;
        }

        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: var(--ios-bg); color: var(--ios-text); letter-spacing: -0.03em; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }

        /* [고정 헤더] */
        .ios-header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: var(--ios-header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--cool-gray-dark); padding-top: env(safe-area-inset-top); overflow: hidden; }
        .header-main { padding: 20px var(--side-padding) 10px; }
        .header-title { font-size: 28px; font-weight: 800; }

        /* MY 노래방 전용 애드온 */
        #header-addon { padding-bottom: 12px; }
        .search-container { padding: 0 var(--side-padding) 12px; }
        .search-box { background: var(--cool-gray-bg); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; }
        .category-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 var(--side-padding) 4px; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { flex: 0 0 70px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 16px; font-size: 12px; font-weight: 600; background: var(--cool-gray-bg); color: var(--ios-subtext); }
        .filter-pill.active { background: var(--ios-text); color: #fff; }
        .filter-pill.fav-pill { flex: 0 0 88px; }

        /* [콘텐츠 영역 - 고정 패딩으로 겹침 방지] */
        .tab-page { display: none; padding: var(--header-home) var(--side-padding) 160px; min-height: 100vh; }
        .tab-page.active { display: block; }
        #tab-add, #tab-more { padding-top: var(--header-sub); }

        .song-card { background: var(--cool-gray-bg); border-radius: 20px; padding: 18px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .ios-input { background: var(--cool-gray-bg); border-radius: 14px; padding: 16px; width: 100%; outline: none; border: 1.5px solid transparent; font-size: 16px; margin-bottom: 10px; }
        #lyricsEditor { min-height: 250px; background: var(--cool-gray-bg); border-radius: 18px; padding: 20px; outline: none; font-size: 16px; line-height: 1.7; margin-bottom: 20px; }

        /* [하단 내비] */
        .bottom-nav { position: fixed; bottom: 30px; left: 24px; right: 24px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 24px; display: flex; padding: 6px; z-index: 2000; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border: 1px solid var(--cool-gray-dark); }
        .nav-item { flex: 1; padding: 12px 0; text-align: center; color: var(--ios-subtext); border-radius: 20px; font-size: 18px; transition: 0.2s; }
        .nav-item.active { background: var(--ios-text); color: #fff; }

        /* [가사 팝업 - 스와이프 지원] */
        .slide-up { position: fixed; inset: 0; background: #fff; z-index: 3000; transform: translate3d(0, 100%, 0); border-radius: 30px 30px 0 0; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); will-change: transform; box-shadow: 0 -5px 25px rgba(0,0,0,0.1); }
        .slide-up.active { transform: translate3d(0, 44px, 0); }
        .swipe-handle { width: 40px; height: 5px; background: #E5E5EA; border-radius: 3px; margin: 12px auto; cursor: grab; }
    </style>
</head>
<body onload="initApp()">

    <header id="main-header" class="ios-header">
        <div class="header-main">
            <h1 id="header-title-text" class="header-title">MY 노래방</h1>
        </div>
        <div id="header-addon">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search text-gray-400 mr-2"></i>
                    <input type="text" id="searchInput" oninput="renderList()" placeholder="제목 또는 가수 검색" class="bg-transparent border-none outline-none w-full text-base">
                </div>
            </div>
            <div class="category-scroll">
                <button onclick="setFilter('FAV')" class="filter-pill fav-pill"><i class="fas fa-heart mr-1 text-[var(--ios-heart)]"></i>즐겨찾기</button>
                <button onclick="setFilter('ALL')" class="filter-pill active">전체</button>
                <button onclick="setFilter('J-POP')" class="filter-pill">J-POP</button>
                <button onclick="setFilter('K-POP')" class="filter-pill">K-POP</button>
                <button onclick="setFilter('C-POP')" class="filter-pill">C-POP</button>
            </div>
        </div>
    </header>

    <div id="tab-home" class="tab-page active">
        <div id="mainList"></div>
    </div>

    <div id="tab-add" class="tab-page">
        <div class="flex p-1 bg-[#F0F2F5] rounded-2xl mb-6">
            <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm">J-POP</button>
            <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">K-POP</button>
            <button onclick="setFormGenre('C-POP')" id="btnC" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">C-POP</button>
        </div>
        <input type="hidden" id="editingId">
        <input type="text" id="inTitle" class="ios-input" placeholder="제목">
        <input type="text" id="inSubTitle" class="ios-input" placeholder="발음 또는 부제">
        <input type="text" id="inArtist" class="ios-input" placeholder="가수명">
        <div class="grid grid-cols-2 gap-3 mb-3">
            <input type="text" id="inTJ" class="ios-input" placeholder="TJ 번호">
            <input type="text" id="inKY" class="ios-input" placeholder="KY 번호">
        </div>
        <div class="flex gap-2 mb-4">
            <button onmousedown="event.preventDefault(); execCmd('bold')" class="w-10 h-10 bg-white border border-gray-200 rounded-lg"><i class="fas fa-bold"></i></button>
            <button onmousedown="event.preventDefault(); execCmd('hiliteColor', '#FEF08A')" class="w-10 h-10 bg-[#FEF08A] border border-gray-200 rounded-lg"><i class="fas fa-highlighter"></i></button>
            <button onmousedown="event.preventDefault(); execCmd('removeFormat')" class="w-10 h-10 bg-white border border-gray-200 rounded-lg"><i class="fas fa-eraser"></i></button>
        </div>
        <div id="lyricsEditor" contenteditable="true" placeholder="가사를 입력하세요..."></div>
        <div class="pb-10"><button onclick="saveSong()" id="saveBtn" class="w-full py-5 bg-[#1C1E21] text-white rounded-3xl font-bold text-xl">등록 완료</button></div>
    </div>

    <div id="tab-more" class="tab-page">
        <div class="space-y-3">
            <div onclick="exportData()" class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 백업</span><i class="fas fa-download text-blue-400"></i></div>
            <label class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 복구</span><input type="file" onchange="importData(this)" class="hidden"><i class="fas fa-upload text-blue-400"></i></label>
            <div onclick="clearData()" class="ios-input flex justify-between items-center text-red-400 cursor-pointer"><span>모든 데이터 초기화</span><i class="fas fa-trash-alt"></i></div>
            <div class="pt-20 text-center opacity-30 text-[10px] font-bold tracking-widest uppercase">My Karaoke v8.2.0 Swipe Fix</div>
        </div>
    </div>

    <div id="lyricPopup" class="slide-up flex flex-col">
        <div class="swipe-handle" id="swipe-area"></div>
        <header class="px-8 py-2 flex justify-between items-center">
            <div class="flex-1 overflow-hidden"><h3 id="popTitle" class="font-bold text-2xl truncate"></h3><p id="popArtist" class="text-sm text-gray-400 mt-1"></p></div>
            <div class="flex gap-5"><button id="popEditBtn" class="text-gray-400 text-xl"><i class="fas fa-edit"></i></button><button id="popFavBtn" class="text-2xl"><i class="fas fa-heart"></i></button></div>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto px-8 py-6 text-xl leading-relaxed"></div>
        <div class="px-8 pt-6 pb-24 bg-[#F8FAFC] flex gap-5">
            <div class="flex-1 text-center border-r border-gray-200"><span class="block text-[10px] font-bold text-gray-400 uppercase">TJ</span><span id="popTJ" class="text-2xl font-black italic"></span></div>
            <div class="flex-1 text-center"><span class="block text-[10px] font-bold text-gray-400 uppercase">KY</span><span id="popKY" class="text-2xl font-black italic"></span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house"></i></div>
        <div class="nav-item" onclick="switchTab('add', this)"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-gear"></i></div>
    </nav>

    <script>
        let songs = [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';

        function initApp() {
            songs = JSON.parse(localStorage.getItem('karaoke_v5_data')) || [];
            renderList();
            initSwipeDismiss();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            
            const addon = document.getElementById('header-addon');
            const title = document.getElementById('header-title-text');
            if(tabId === 'home') { addon.style.display = "block"; title.innerText = "MY 노래방"; renderList(); }
            else { addon.style.display = "none"; title.innerText = tabId === 'add' ? "곡 추가" : "설정"; }
            window.scrollTo(0,0);
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            if(!title || !artist) return alert('제목과 가수는 필수입니다.');
            const data = { id: Date.now(), genre: formGenre, title, sub: document.getElementById('inSubTitle').value, artist, tj: document.getElementById('inTJ').value || '-', ky: document.getElementById('inKY').value || '-', lyrics: document.getElementById('lyricsEditor').innerHTML, fav: false };
            songs.unshift(data);
            localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
            location.reload();
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const matchSearch = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return matchSearch;
                if(currentFilter === 'FAV') return matchSearch && s.fav;
                return matchSearch && s.genre === currentFilter;
            });
            container.innerHTML = filtered.length ? '' : '<div class="text-center py-20 opacity-20 font-bold italic">곡을 추가해 보세요</div>';
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card shadow-sm active:opacity-60';
                card.onclick = () => showLyrics(s.id);
                card.innerHTML = `<div class="flex-1 overflow-hidden pr-4"><div class="flex items-center gap-1.5">${s.fav ? '<i class="fas fa-heart text-[var(--ios-heart)] text-[10px]"></i>' : ''}<h4 class="font-bold text-lg truncate">${s.title}</h4></div><p class="text-xs text-gray-400 mt-1 truncate">${s.artist} ${s.sub ? '• '+s.sub : ''}</p></div><div class="shrink-0 text-right font-black italic"><div class="text-[11px] text-red-400">${s.tj}</div><div class="text-[11px] text-green-500">${s.ky}</div></div>`;
                container.appendChild(card);
            });
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-pill').forEach(btn => {
                const isMatch = (f === 'ALL' && btn.innerText === '전체') || (f === 'FAV' && btn.innerText.includes('즐겨찾기')) || btn.innerText === f;
                isMatch ? btn.classList.add('active') : btn.classList.remove('active');
            });
            renderList();
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} • ${song.genre}`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics || '가사가 없습니다.';
            const fBtn = document.getElementById('popFavBtn');
            fBtn.style.color = song.fav ? '#FF8787' : '#E5E5EA';
            fBtn.onclick = (e) => { e.stopPropagation(); song.fav = !song.fav; localStorage.setItem('karaoke_v5_data', JSON.stringify(songs)); showLyrics(id); };
            document.getElementById('lyricPopup').classList.add('active');
        }

        // [스와이프 닫기 로직]
        function initSwipeDismiss() {
            const popup = document.getElementById('lyricPopup');
            let startY = 0;
            let currentY = 0;

            popup.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; popup.style.transition = 'none'; });
            popup.addEventListener('touchmove', (e) => {
                currentY = e.touches[0].clientY;
                const diff = currentY - startY;
                if (diff > 0) popup.style.transform = `translate3d(0, ${44 + diff}px, 0)`;
            });
            popup.addEventListener('touchend', (e) => {
                popup.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
                const diff = currentY - startY;
                if (diff > 150) { popup.classList.remove('active'); popup.style.transform = ''; }
                else { popup.style.transform = 'translate3d(0, 44px, 0)'; }
                startY = 0; currentY = 0;
            });
        }

        function closeLyrics() { document.getElementById('lyricPopup').classList.remove('active'); }
        function execCmd(c,v=null) { document.getElementById('lyricsEditor').focus(); document.execCommand(c, false, v); }
        function exportData() { const b=new Blob([JSON.stringify(songs)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='karaoke.json'; a.click(); }
        function importData(i) { const r=new FileReader(); r.onload=(e)=>{ songs=JSON.parse(e.target.result); localStorage.setItem('karaoke_v5_data',JSON.stringify(songs)); location.reload(); }; r.readAsText(i.files[0]); }
        function clearData() { if(confirm('모든 데이터를 삭제할까요?')) { localStorage.removeItem('karaoke_v5_data'); location.reload(); } }
        function setFormGenre(g) { formGenre = g; document.querySelectorAll('#tab-add button').forEach(b => b.classList.replace('bg-white','text-gray-400')); document.getElementById(g==='J-POP'?'btnJ':(g==='K-POP'?'btnK':'btnC')).classList.replace('text-gray-400','bg-white'); }
    </script>
</body>
</html>
