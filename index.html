<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karaoke Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/180/007AFF/headphones.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/007AFF/headphones.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');
        
        :root { --apple-blue: #007AFF; --apple-bg: #F2F2F7; }

        body {
            font-family: 'Inter', 'Noto Sans KR', 'Noto Sans SC', sans-serif;
            background-color: var(--apple-bg);
            color: #1C1C1E;
            overscroll-behavior-y: none;
        }

        .glass-header {
            position: sticky;
            top: 0; z-index: 50;
            background: rgba(242, 242, 247, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .nav-item { flex: 1; padding: 12px 0; text-align: center; color: #8E8E93; font-size: 10px; }
        .nav-item.active { color: var(--apple-blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

        .slide-up {
            position: fixed; inset: 0; background: white; z-index: 200;
            transform: translate3d(0, 100%, 0);
            transition: transform 0.35s cubic-bezier(0.33, 1, 0.68, 1);
            will-change: transform;
        }
        .slide-up.active { transform: translate3d(0, 0, 0); }

        .song-card {
            background: #FFFFFF; border-radius: 14px; padding: 16px;
            margin-bottom: 12px; display: flex; justify-content: space-between;
            align-items: center; transition: all 0.1s;
        }
        .song-card:active { transform: scale(0.97); opacity: 0.8; }

        .rich-content { white-space: pre-wrap; word-break: break-all; -webkit-overflow-scrolling: touch; }
        
        #lyricsEditor {
            min-height: 180px; background: #FFFFFF; border-radius: 12px;
            padding: 16px; outline: none; border: 1px solid #E5E5EA;
        }

        /* Empty State */
        .no-content {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding-top: 100px; color: #8E8E93;
        }
        .no-content i { font-size: 50px; opacity: 0.3; margin-bottom: 15px; }

        .tag-jpop { color: #FF3B30; } 
        .tag-kpop { color: #007AFF; } 
        .tag-cpop { color: #FF9500; }
        .text-heart { color: #FF2D55; }
    </style>
</head>
<body>

    <div id="tab-home" class="tab-content active">
        <header class="glass-header px-5 pt-10 pb-4">
            <h1 class="text-3xl font-bold mb-4">Archives</h1>
            <div class="flex items-center bg-gray-200/60 rounded-xl px-3 py-2.5 mb-4 shadow-inner">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <input type="text" id="searchInput" oninput="renderList()" placeholder="제목 또는 가수 검색" class="bg-transparent border-none outline-none w-full text-base">
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button onclick="setFilter('FAV')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">
                    <i class="fas fa-heart mr-1"></i>즐겨찾기
                </button>
                <button onclick="setFilter('ALL')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-black text-white">전체</button>
                <button onclick="setFilter('J-POP')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">J-POP</button>
                <button onclick="setFilter('K-POP')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">K-POP</button>
                <button onclick="setFilter('C-POP')" class="filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-white text-gray-500 border">C-POP</button>
            </div>
        </header>
        <main class="px-5 pt-4 pb-28" id="mainList"></main>
    </div>

    <div id="tab-add" class="tab-content px-6 pt-12 pb-28 hidden">
        <h2 class="text-2xl font-bold mb-6">노래 추가</h2>
        <div class="flex p-1 bg-gray-200 rounded-xl mb-6">
            <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-2 rounded-lg text-xs font-bold bg-white shadow-sm">J-POP</button>
            <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-2 rounded-lg text-xs font-bold text-gray-500">K-POP</button>
            <button onclick="setFormGenre('C-POP')" id="btnC" class="flex-1 py-2 rounded-lg text-xs font-bold text-gray-500">C-POP</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="inTitle" class="w-full p-4 rounded-xl bg-white shadow-sm outline-none" placeholder="제목">
            <input type="text" id="inSubTitle" class="w-full p-4 rounded-xl bg-white shadow-sm outline-none" placeholder="부제목 (발음/한국어명)">
            <input type="text" id="inArtist" class="w-full p-4 rounded-xl bg-white shadow-sm outline-none" placeholder="가수명">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="inTJ" class="p-4 rounded-xl bg-white shadow-sm outline-none" placeholder="TJ 번호">
                <input type="text" id="inKY" class="p-4 rounded-xl bg-white shadow-sm outline-none" placeholder="KY 번호">
            </div>
            <div id="lyricsEditor" contenteditable="true" class="bg-white shadow-sm" placeholder="가사를 복사 붙여넣기 하세요"></div>
            <button onclick="saveSong()" class="w-full py-4 bg-blue-500 text-white rounded-2xl font-bold text-lg active:scale-95 transition-transform">저장하기</button>
        </div>
    </div>

    <div id="tab-more" class="tab-content px-6 pt-12 hidden">
        <h2 class="text-2xl font-bold mb-6">설정</h2>
        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border">
            <div onclick="exportData()" class="p-4 border-b flex justify-between items-center active:bg-gray-50">
                <span>데이터 백업</span><i class="fas fa-file-export text-gray-300"></i>
            </div>
            <label class="p-4 border-b flex justify-between items-center active:bg-gray-50 cursor-pointer">
                <span>데이터 복구</span><input type="file" onchange="importData(this)" class="hidden"><i class="fas fa-file-import text-gray-300"></i>
            </label>
            <div onclick="clearData()" class="p-4 flex justify-between items-center text-red-500 active:bg-gray-50">
                <span>초기화</span><i class="fas fa-trash-alt"></i>
            </div>
        </div>
    </div>

    <div id="lyricPopup" class="slide-up">
        <header class="px-5 pt-8 pb-4 border-b flex justify-between items-center">
            <button onclick="closeLyrics()" class="text-blue-500 font-semibold">닫기</button>
            <div class="text-center overflow-hidden flex-1 px-4">
                <h3 id="popTitle" class="font-bold truncate text-[15px]"></h3>
                <p id="popArtist" class="text-[11px] text-gray-400 truncate"></p>
            </div>
            <button id="popFavBtn" class="text-2xl"><i class="fas fa-heart"></i></button>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto p-6 rich-content text-[18px] leading-relaxed"></div>
        <div class="p-5 border-t bg-gray-50 flex gap-3">
            <div class="flex-1 bg-white p-3 rounded-xl text-center shadow-sm">
                <span class="block text-[10px] font-bold text-red-500 mb-1">TJ</span>
                <span id="popTJ" class="text-xl font-black italic"></span>
            </div>
            <div class="flex-1 bg-white p-3 rounded-xl text-center shadow-sm">
                <span class="block text-[10px] font-bold text-green-500 mb-1">KY</span>
                <span id="popKY" class="text-xl font-black italic"></span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-music"></i>리스트</div>
        <div class="nav-item" onclick="switchTab('add', this)"><i class="fas fa-plus-circle"></i>추가</div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-cog"></i>설정</div>
    </nav>

    <script>
        let songs = JSON.parse(localStorage.getItem('karaoke_v3_data')) || [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tabId === 'home') renderList();
        }

        function setFormGenre(g) {
            formGenre = g;
            const btns = { 'J-POP': 'btnJ', 'K-POP': 'btnK', 'C-POP': 'btnC' };
            Object.values(btns).forEach(id => document.getElementById(id).className = 'flex-1 py-2 rounded-lg text-xs font-bold text-gray-500');
            document.getElementById(btns[g]).className = 'flex-1 py-2 rounded-lg text-xs font-bold bg-white shadow-sm';
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            if(!title || !artist) return alert('제목과 가수는 필수입니다.');
            songs.unshift({
                id: Date.now(), genre: formGenre, title,
                sub: document.getElementById('inSubTitle').value.trim(),
                artist, tj: document.getElementById('inTJ').value || '-',
                ky: document.getElementById('inKY').value || '-',
                lyrics: document.getElementById('lyricsEditor').innerHTML, fav: false
            });
            localStorage.setItem('karaoke_v3_data', JSON.stringify(songs));
            alert('저장되었습니다!');
            location.reload();
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnText = btn.innerText.trim();
                let isMatch = false;
                if(f === 'ALL' && btnText === '전체') isMatch = true;
                else if(f === 'FAV' && btnText.includes('즐겨찾기')) isMatch = true;
                else if(btnText === f) isMatch = true;

                btn.className = `filter-btn shrink-0 px-4 py-1.5 rounded-full text-xs font-bold ${isMatch ? 'bg-black text-white' : 'bg-white text-gray-500 border'}`;
            });
            renderList();
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="no-content">
                        <i class="fas fa-magnifying-glass"></i>
                        <p class="font-bold text-lg">NO CONTENT FOUND</p>
                        <p class="text-sm">검색 결과가 없거나 등록된 노래가 없습니다.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            const frag = document.createDocumentFragment();
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card shadow-sm';
                card.onclick = () => showLyrics(s.id);
                const genreClass = s.genre === 'J-POP' ? 'tag-jpop' : (s.genre === 'K-POP' ? 'tag-kpop' : 'tag-cpop');
                card.innerHTML = `
                    <div class="overflow-hidden pr-4">
                        <div class="flex items-center gap-1">
                            ${s.fav ? '<i class="fas fa-heart text-heart text-[10px]"></i>' : ''}
                            <h4 class="font-bold text-[17px] truncate">${s.title}</h4>
                        </div>
                        <p class="text-[12px] text-gray-400 truncate">${s.sub ? s.sub + ' · ' : ''}${s.artist}</p>
                        <span class="${genreClass} text-[10px] font-bold uppercase">${s.genre}</span>
                    </div>
                    <div class="shrink-0 text-right border-l pl-4">
                        <div class="text-[11px] font-black italic text-red-500">T ${s.tj}</div>
                        <div class="text-[11px] font-black italic text-green-600">K ${s.ky}</div>
                    </div>
                `;
                frag.appendChild(card);
            });
            container.appendChild(frag);
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} (${song.genre})`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics;
            
            const favBtn = document.getElementById('popFavBtn');
            favBtn.style.color = song.fav ? '#FF2D55' : '#E5E5EA';
            favBtn.onclick = () => {
                song.fav = !song.fav;
                localStorage.setItem('karaoke_v3_data', JSON.stringify(songs));
                favBtn.style.color = song.fav ? '#FF2D55' : '#E5E5EA';
            };
            document.getElementById('lyricPopup').classList.add('active');
        }

        function closeLyrics() { document.getElementById('lyricPopup').classList.remove('active'); }

        function exportData() {
            const blob = new Blob([JSON.stringify(songs)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `karaoke_backup.json`;
            a.click();
        }

        function importData(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                songs = JSON.parse(e.target.result);
                localStorage.setItem('karaoke_v3_data', JSON.stringify(songs));
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }

        function clearData() {
            if(confirm('정말 모든 데이터를 삭제할까요?')) {
                localStorage.removeItem('karaoke_v3_data');
                location.reload();
            }
        }
        renderList();
    </script>
</body>
</html>
