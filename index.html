<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>노래방 아카이브</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/180/74B9FF/headphones.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        :root {
            --ios-bg: #FFFFFF;
            --ios-header-bg: rgba(255, 255, 255, 0.85);
            --cool-gray-bg: #F0F2F5;
            --cool-gray-dark: #E4E7EB;
            --cool-gray-border: #DDE1E7;
            --ios-text: #1C1E21;
            --ios-subtext: #8E96A3;
            --ios-blue: #74B9FF;
            --ios-heart: #FF8787;
            --spring-easing: cubic-bezier(0.2, 1, 0.2, 1);
            --side-padding: 24px;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            letter-spacing: -0.03em;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* [헤더 구조 수정] height를 고정하지 않고 내용에 따라 가변적으로 작동 */
        .ios-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: var(--ios-header-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding-top: env(safe-area-inset-top);
            border-bottom: 1px solid transparent;
        }
        .header-main { padding: 32px var(--side-padding) 12px; }
        .header-title { font-size: 34px; font-weight: 800; letter-spacing: -0.05em; }

        /* 홈 전용 애드온: 탭 전환 시 display: none으로 공간 점유를 제거 */
        #homeHeaderAddon { display: block; padding-bottom: 15px; }
        .search-container { padding: 0 var(--side-padding) 16px; }
        .search-box { background: var(--cool-gray-bg); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; }
        
        .category-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 var(--side-padding) 4px; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .filter-pill {
            flex-shrink: 0; padding: 7px 16px; border-radius: 18px;
            font-size: 14px; font-weight: 600; background: var(--cool-gray-bg);
            color: var(--ios-subtext); transition: 0.2s;
        }
        .filter-pill.active { background: var(--ios-text); color: #fff; }

        /* [탭 페이지 여백 최적화] */
        .tab-page { display: none; padding: 0 var(--side-padding) 140px; min-height: 100vh; }
        
        /* 헤더가 고정이 아닌 relative 역할을 하므로 각 페이지 상단 여백을 헤더 높이에 맞춤 */
        .tab-page.active { display: block; }

        /* [공통 요소] */
        .ios-input { background: var(--cool-gray-bg); border-radius: 14px; padding: 16px; width: 100%; outline: none; font-size: 16px; border: 1.5px solid transparent; }
        .ios-input:focus { background: #fff; border-color: var(--cool-gray-border); }
        .song-card { background: var(--cool-gray-bg); border-radius: 20px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .song-card:active { transform: scale(0.98); background: var(--cool-gray-dark); }

        /* [툴바 디자인 - 화이트 박스 + 회색 테두리] */
        .pro-toolbar { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding: 4px 0; }
        .pro-toolbar::-webkit-scrollbar { display: none; }
        .tool-box {
            background: #fff; border: 1px solid var(--cool-gray-border); border-radius: 12px;
            width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s; cursor: pointer;
        }
        .tool-box:active { transform: scale(0.9); background: var(--cool-gray-bg); }
        .color-dot { width: 20px; height: 20px; border-radius: 6px; }

        #lyricsEditor { 
            min-height: 250px; background: var(--cool-gray-bg); border-radius: 20px; 
            padding: 20px; outline: none; font-size: 17px; line-height: 1.8;
        }

        /* [하단 네비게이션] */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 24px; right: 24px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border-radius: 28px; display: flex; padding: 6px; z-index: 2000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06); border: 1px solid var(--cool-gray-dark);
        }
        .nav-item { flex: 1; padding: 12px 0; border-radius: 22px; color: var(--ios-subtext); text-align: center; }
        .nav-item.active { background: var(--cool-gray-bg); color: var(--ios-blue); font-weight: bold; }

        /* [가사 팝업] */
        .slide-up {
            position: fixed; inset: 0; background: #fff; z-index: 3000;
            transform: translate3d(0, 100%, 0); border-radius: 40px 40px 0 0;
            transition: transform 0.5s var(--spring-easing);
        }
        .slide-up.active { transform: translate3d(0, 44px, 0); }
    </style>
</head>
<body>

    <header id="mainHeader" class="ios-header">
        <div class="header-main">
            <h1 id="pageTitle" class="header-title">보관함</h1>
        </div>
        <div id="homeHeaderAddon">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search text-gray-400 mr-3 text-sm"></i>
                    <input type="text" id="searchInput" oninput="renderList()" placeholder="제목 또는 가수 검색" class="bg-transparent border-none outline-none w-full text-base">
                </div>
            </div>
            <div class="category-scroll">
                <button onclick="setFilter('FAV')" class="filter-pill"><i class="fas fa-heart mr-1 text-[var(--ios-heart)]"></i>즐겨찾기</button>
                <button onclick="setFilter('ALL')" class="filter-pill active">전체</button>
                <button onclick="setFilter('J-POP')" class="filter-pill">J-POP</button>
                <button onclick="setFilter('K-POP')" class="filter-pill">K-POP</button>
                <button onclick="setFilter('C-POP')" class="filter-pill">C-POP</button>
            </div>
        </div>
    </header>

    <div id="tab-home" class="tab-page active" style="padding-top: 220px;">
        <div id="mainList"></div>
    </div>

    <div id="tab-add" class="tab-page" style="padding-top: 130px;">
        <div class="flex p-1 bg-[#F0F2F5] rounded-2xl mb-6">
            <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm">J-POP</button>
            <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">K-POP</button>
            <button onclick="setFormGenre('C-POP')" id="btnC" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">C-POP</button>
        </div>
        <input type="hidden" id="editingId">
        <div class="space-y-3">
            <input type="text" id="inTitle" class="ios-input" placeholder="제목">
            <input type="text" id="inSubTitle" class="ios-input" placeholder="발음 또는 부제">
            <input type="text" id="inArtist" class="ios-input" placeholder="가수명">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="inTJ" class="ios-input" placeholder="TJ 번호">
                <input type="text" id="inKY" class="ios-input" placeholder="금영 번호">
            </div>
            
            <div class="pro-toolbar">
                <div class="tool-box" onclick="execCmd('bold')"><i class="fas fa-bold"></i></div>
                <div class="tool-box" onclick="execCmd('removeFormat')"><i class="fas fa-eraser"></i></div>
                <div class="tool-box" onclick="execCmd('foreColor', '#FF8787')"><div class="color-dot bg-[#FF8787]"></div></div>
                <div class="tool-box" onclick="execCmd('foreColor', '#74B9FF')"><div class="color-dot bg-[#74B9FF]"></div></div>
                <div class="tool-box" onclick="execCmd('foreColor', '#7BE38E')"><div class="color-dot bg-[#7BE38E]"></div></div>
                <div class="tool-box" onclick="execCmd('foreColor', '#1C1E21')"><div class="color-dot bg-[#1C1E21]"></div></div>
            </div>
            
            <div id="lyricsEditor" contenteditable="true"></div>
            <button onclick="saveSong()" id="saveBtn" class="w-full py-5 bg-[#1C1E21] text-white rounded-3xl font-bold text-xl active:scale-95 transition-all mt-4">등록하기</button>
            <button id="cancelEditBtn" onclick="cancelEditing()" class="hidden w-full py-4 text-gray-400 font-semibold text-center mt-2">수정 취소</button>
        </div>
    </div>

    <div id="tab-more" class="tab-page" style="padding-top: 130px;">
        <div class="space-y-3">
            <div onclick="exportData()" class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 백업</span><i class="fas fa-download text-blue-400"></i></div>
            <label class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 복구</span><input type="file" onchange="importData(this)" class="hidden"><i class="fas fa-upload text-blue-400"></i></label>
            <div onclick="clearData()" class="ios-input flex justify-between items-center text-red-400 cursor-pointer"><span>모든 데이터 초기화</span><i class="fas fa-trash-alt"></i></div>
            <div class="pt-24 text-center opacity-30 text-[10px] uppercase font-bold tracking-tighter">Version 6.6.0 Stable</div>
        </div>
    </div>

    <div id="lyricPopup" class="slide-up flex flex-col">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-4" onclick="closeLyrics()"></div>
        <header class="px-8 py-4 flex justify-between items-center">
            <div class="flex-1 overflow-hidden text-left">
                <h3 id="popTitle" class="font-bold text-2xl truncate"></h3>
                <p id="popArtist" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <div class="flex gap-5">
                <button id="popEditBtn" class="text-gray-400 text-xl"><i class="fas fa-edit"></i></button>
                <button id="popFavBtn" class="text-2xl"><i class="fas fa-heart"></i></button>
            </div>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto px-8 py-6 text-xl text-left"></div>
        <div class="px-8 pt-6 pb-14 bg-[#F8FAFC] flex gap-5">
            <div class="flex-1 text-center border-r border-gray-200"><span class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">TJ</span><span id="popTJ" class="text-2xl font-black italic"></span></div>
            <div class="flex-1 text-center"><span class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">KY</span><span id="popKY" class="text-2xl font-black italic"></span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house"></i></div>
        <div class="nav-item" onclick="switchTab('add', this)"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-gear"></i></div>
    </nav>

    <script>
        let songs = JSON.parse(localStorage.getItem('karaoke_v5_data')) || [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            
            const titleMap = { 'home': '보관함', 'add': '노래 등록', 'more': '설정' };
            document.getElementById('pageTitle').innerText = titleMap[tabId];
            
            // 핵심: 가변 높이 대신 display 조절로 불필요한 공간 제거
            const addon = document.getElementById('homeHeaderAddon');
            if(tabId === 'home') {
                addon.style.display = "block";
                renderList();
            } else {
                addon.style.display = "none";
            }
            
            if(tabId !== 'add') cancelEditing();
            window.scrollTo(0,0);
        }

        function setFormGenre(g) {
            formGenre = g;
            ['btnJ', 'btnK', 'btnC'].forEach(id => document.getElementById(id).className = 'flex-1 py-3 rounded-xl text-xs font-bold text-gray-400');
            const target = g === 'J-POP' ? 'btnJ' : (g === 'K-POP' ? 'btnK' : 'btnC');
            document.getElementById(target).className = 'flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm';
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            const editId = document.getElementById('editingId').value;
            if(!title || !artist) return;
            const data = {
                id: editId ? parseInt(editId) : Date.now(),
                genre: formGenre, title, sub: document.getElementById('inSubTitle').value,
                artist, tj: document.getElementById('inTJ').value || '-', ky: document.getElementById('inKY').value || '-',
                lyrics: document.getElementById('lyricsEditor').innerHTML,
                fav: editId ? songs.find(s => s.id === parseInt(editId)).fav : false
            };
            if(editId) songs[songs.findIndex(s => s.id === data.id)] = data;
            else songs.unshift(data);
            localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
            location.reload();
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });
            container.innerHTML = filtered.length ? '' : '<div class="text-center py-40 opacity-20 font-bold italic">데이터가 없습니다</div>';
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card shadow-sm';
                card.onclick = () => showLyrics(s.id);
                card.innerHTML = `
                    <div class="overflow-hidden pr-4 text-left">
                        <div class="flex items-center gap-1.5">
                            ${s.fav ? '<i class="fas fa-heart text-[var(--ios-heart)] text-[10px]"></i>' : ''}
                            <h4 class="font-bold text-xl truncate tracking-tight">${s.title}</h4>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 truncate">${s.sub ? s.sub + ' • ' : ''}${s.artist}</p>
                    </div>
                    <div class="shrink-0 text-right">
                        <div class="text-[11px] font-black italic text-red-400">${s.tj}</div>
                        <div class="text-[11px] font-black italic text-green-400">${s.ky}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-pill').forEach(btn => {
                const isMatch = (f === 'ALL' && btn.innerText === '전체') || (f === 'FAV' && btn.innerText.includes('즐겨찾기')) || btn.innerText === f;
                btn.className = `filter-pill shrink-0 px-5 py-2 rounded-full text-sm font-semibold ${isMatch ? 'active' : ''}`;
            });
            renderList();
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} • ${song.genre}`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics;
            const fBtn = document.getElementById('popFavBtn');
            fBtn.style.color = song.fav ? '#FF8787' : '#E5E5EA';
            fBtn.onclick = () => { song.fav = !song.fav; localStorage.setItem('karaoke_v5_data', JSON.stringify(songs)); showLyrics(id); };
            document.getElementById('popEditBtn').onclick = () => {
                closeLyrics(); switchTab('add', document.querySelectorAll('.nav-item')[1]);
                document.getElementById('editingId').value = song.id;
                document.getElementById('inTitle').value = song.title;
                document.getElementById('inSubTitle').value = song.sub;
                document.getElementById('inArtist').value = song.artist;
                document.getElementById('inTJ').value = song.tj;
                document.getElementById('inKY').value = song.ky;
                document.getElementById('lyricsEditor').innerHTML = song.lyrics;
                document.getElementById('cancelEditBtn').classList.remove('hidden');
                document.getElementById('saveBtn').innerText = '수정 완료';
                setFormGenre(song.genre);
            };
            document.getElementById('lyricPopup').classList.add('active');
        }

        function closeLyrics() { document.getElementById('lyricPopup').classList.remove('active'); }
        function cancelEditing() {
            document.getElementById('editingId').value = '';
            document.querySelectorAll('#tab-add .ios-input').forEach(i => i.value = '');
            document.getElementById('lyricsEditor').innerHTML = '';
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerText = '등록하기';
        }
        function execCmd(c,v=null) { document.execCommand(c,false,v); }
        function exportData() { const b=new Blob([JSON.stringify(songs)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='karaoke_backup.json'; a.click(); }
        function importData(i) { const r=new FileReader(); r.onload=(e)=>{ songs=JSON.parse(e.target.result); localStorage.setItem('karaoke_v5_data',JSON.stringify(songs)); location.reload(); }; r.readAsText(i.files[0]); }
        function clearData() { if(confirm('모든 데이터를 삭제할까요?')) { localStorage.removeItem('karaoke_v5_data'); location.reload(); } }
        renderList();
    </script>
</body>
</html>
