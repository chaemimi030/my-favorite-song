<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 노래방 애창곡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="flex justify-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white shadow-2xl flex flex-col relative">
        
        <header class="p-4 bg-white sticky top-0 z-30 border-b">
            <div class="flex items-center justify-between mb-4">
                <div class="flex bg-gray-100 p-1 rounded-xl w-48">
                    <button onclick="setBrand('TJ')" id="btn-tj" class="flex-1 py-1.5 text-sm font-extrabold rounded-lg transition-all bg-white shadow-sm">TJ</button>
                    <button onclick="setBrand('KY')" id="btn-ky" class="flex-1 py-1.5 text-sm font-extrabold rounded-lg transition-all text-gray-400">금영</button>
                </div>
                <button onclick="toggleSearch()" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                    <i class="fas fa-plus" id="plus-icon"></i>
                </button>
            </div>

            <div id="search-section" class="hidden animate-fade-in">
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="곡명, 가수 또는 번호 검색..." 
                        class="w-full p-3 pl-10 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                </div>
                <div id="search-results" class="mt-2 max-h-60 overflow-y-auto border rounded-2xl hidden bg-white shadow-xl"></div>
            </div>
        </header>

        <main class="flex-1 p-4 space-y-4 overflow-y-auto pb-24">
            <div class="flex items-center space-x-2 text-sm text-gray-500 font-semibold mb-2">
                <span class="bg-emerald-100 text-emerald-600 px-2 py-0.5 rounded">기본폴더</span>
                <span>🍀</span>
            </div>

            <div id="empty-state" class="text-center py-20 text-gray-300">
                <i class="fas fa-music text-5xl mb-4"></i>
                <p>등록된 애창곡이 없습니다.<br>+ 버튼을 눌러 추가해보세요!</p>
            </div>

            <div id="song-list" class="space-y-3">
                </div>
        </main>

        <nav class="fixed bottom-0 max-w-md w-full bg-white border-t flex justify-around p-3 safe-area-bottom shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <div class="flex flex-col items-center text-gray-300"><i class="fas fa-search text-xl"></i><span class="text-[10px] mt-1">검색</span></div>
            <div class="flex flex-col items-center text-gray-300"><i class="fas fa-chart-line text-xl"></i><span class="text-[10px] mt-1">인기차트</span></div>
            <div class="flex flex-col items-center text-gray-300"><i class="fas fa-layer-group text-xl"></i><span class="text-[10px] mt-1">신곡</span></div>
            <div class="flex flex-col items-center text-blue-600"><i class="fas fa-heart text-xl"></i><span class="text-[10px] mt-1 font-bold">북마크</span></div>
        </nav>
    </div>

    <script>
        // 임시 데이터베이스 (실제로는 서버 연동 가능)
        const MASTER_DB = [
            { tj: "68781", ky: "44865", title: "アイドル", artist: "YOASOBI" },
            { tj: "27705", ky: "43892", title: "アイのシナ리오", artist: "CHiCO with HoneyWorks" },
            { tj: "68258", ky: "44445", title: "ファンサ", artist: "夏川椎菜" },
            { tj: "27130", ky: "43254", title: "ヘビーローテーション", artist: "AKB48" },
            { tj: "84694", ky: "44012", title: "빛(명탐정 코난)", artist: "메이트" },
            { tj: "68648", ky: "44721", title: "Tot Musica", artist: "Ado" }
        ];

        let currentBrand = 'TJ';
        let mySongs = JSON.parse(localStorage.getItem('mySongs')) || [];

        function setBrand(brand) {
            currentBrand = brand;
            document.getElementById('btn-tj').className = brand === 'TJ' ? 'flex-1 py-1.5 text-sm font-extrabold rounded-lg bg-white shadow-sm' : 'flex-1 py-1.5 text-sm font-extrabold rounded-lg text-gray-400';
            document.getElementById('btn-ky').className = brand === 'KY' ? 'flex-1 py-1.5 text-sm font-extrabold rounded-lg bg-white shadow-sm' : 'flex-1 py-1.5 text-sm font-extrabold rounded-lg text-gray-400';
            renderList();
        }

        function toggleSearch() {
            const sec = document.getElementById('search-section');
            const icon = document.getElementById('plus-icon');
            sec.classList.toggle('hidden');
            icon.classList.toggle('fa-plus');
            icon.classList.toggle('fa-times');
            if(!sec.classList.contains('hidden')) document.getElementById('search-input').focus();
        }

        function handleSearch(val) {
            const resDiv = document.getElementById('search-results');
            if(!val) { resDiv.classList.add('hidden'); return; }
            
            const filtered = MASTER_DB.filter(s => s.title.includes(val) || s.tj.includes(val) || s.ky.includes(val));
            
            if(filtered.length > 0) {
                resDiv.innerHTML = filtered.map(s => `
                    <div onclick='addSong(${JSON.stringify(s)})' class="p-4 border-b hover:bg-blue-50 cursor-pointer flex justify-between items-center">
                        <div>
                            <div class="font-bold text-sm">${s.title}</div>
                            <div class="text-xs text-gray-400">${s.artist}</div>
                        </div>
                        <div class="text-blue-600 font-black">${currentBrand === 'TJ' ? s.tj : s.ky}</div>
                    </div>
                `).join('');
                resDiv.classList.remove('hidden');
            } else {
                resDiv.classList.add('hidden');
            }
        }

        function addSong(song) {
            const koreanTitle = prompt("한국어로 표시할 제목을 입력하세요 (예: 아이돌-최애의아이)", song.title);
            if(koreanTitle === null) return;

            const newSong = { ...song, userTitle: koreanTitle, id: Date.now() };
            mySongs.unshift(newSong);
            saveData();
            toggleSearch();
            document.getElementById('search-input').value = '';
            document.getElementById('search-results').classList.add('hidden');
            renderList();
        }

        function deleteSong(id) {
            if(confirm('이 곡을 삭제할까요?')) {
                mySongs = mySongs.filter(s => s.id !== id);
                saveData();
                renderList();
            }
        }

        function saveData() {
            localStorage.setItem('mySongs', JSON.stringify(mySongs));
        }

        function renderList() {
            const listDiv = document.getElementById('song-list');
            const empty = document.getElementById('empty-state');
            
            if(mySongs.length === 0) {
                empty.classList.remove('hidden');
                listDiv.innerHTML = '';
                return;
            }

            empty.classList.add('hidden');
            listDiv.innerHTML = mySongs.map(s => `
                <div class="flex items-center bg-white p-4 rounded-2xl border border-gray-100 shadow-sm group active:bg-gray-50 transition-colors">
                    <div class="w-16 text-2xl font-black text-gray-800 tracking-tighter">
                        ${currentBrand === 'TJ' ? s.tj : s.ky}
                    </div>
                    <div class="flex-1 px-3 border-l ml-2">
                        <div class="font-bold text-gray-900 truncate w-48">${s.userTitle}</div>
                        <div class="text-xs text-gray-400 mt-1 uppercase">${s.artist}</div>
                    </div>
                    <button onclick="deleteSong(${s.id})" class="text-gray-200 hover:text-red-500 transition-colors p-2">
                        <i class="fas fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }

        // 초기 실행
        renderList();
    </script>
</body>
</html>
