<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>노래방 아카이브</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/180/74B9FF/headphones.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        :root {
            --ios-blue: #74B9FF;
            --ios-bg: #FFFFFF;
            --ios-secondary: #F2F2F7;
            --ios-text: #1C1C1E;
            --ios-card: #FFFFFF;
            --ios-heart: #FF8787;
            --toolbar-item-bg: rgba(0, 0, 0, 0.05);
            --spring-easing: cubic-bezier(0.2, 1, 0.2, 1);
        }

        body.dark {
            --ios-bg: #000000;
            --ios-secondary: #1C1C1E;
            --ios-text: #FFFFFF;
            --ios-card: #2C2C2E;
            --toolbar-item-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            letter-spacing: -0.03em;
            transition: background-color 0.4s var(--spring-easing);
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 헤더 */
        .ios-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(var(--header-bg, 255, 255, 255), 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding-top: env(safe-area-inset-top);
        }
        body.dark .ios-header { --header-bg: 0, 0, 0; }
        .header-content { padding: 24px 24px 12px; }

        /* 필터/카테고리 */
        .category-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 0 24px 15px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        .filter-pill {
            flex-shrink: 0; padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 600; background: var(--ios-secondary);
            color: #8E8E93; transition: all 0.4s var(--spring-easing);
        }
        .filter-pill.active { background: var(--ios-text); color: var(--ios-bg); transform: scale(1.03); }

        /* 페이지 레이아웃 */
        .tab-page { display: none; padding-top: 130px; padding-bottom: 150px; min-height: 100vh; }
        #tab-home { padding-top: 185px; }
        .tab-page.active { display: block; animation: tabFade 0.4s var(--spring-easing); }
        @keyframes tabFade { from { opacity: 0; } to { opacity: 1; } }

        /* 공통 카드/박스 쉐입 통일 (22px) */
        .ios-card-shape {
            background: var(--ios-secondary);
            border-radius: 22px;
            transition: all 0.4s var(--spring-easing);
        }

        .song-card {
            composes: ios-card-shape;
            padding: 20px; margin-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .song-card:active { transform: scale(0.96); opacity: 0.7; }

        /* 노래 등록 입력창 쉐입 통일 */
        .ios-input {
            background: var(--ios-secondary);
            border-radius: 22px; /* 카드와 동일하게 통일 */
            padding: 18px 20px; width: 100%; outline: none;
            color: var(--ios-text); font-size: 16px; border: none;
        }

        /* 가사 편집 툴바 디자인 개선 */
        .tool-bar {
            background: var(--ios-secondary);
            border-radius: 22px;
            padding: 8px; margin-bottom: 12px;
            display: flex; justify-content: space-around;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .tool-btn {
            width: 44px; height: 44px; display: flex; align-items: center;
            justify-content: center; border-radius: 15px;
            background: var(--toolbar-item-bg);
            color: var(--ios-text); font-size: 18px;
        }
        .tool-btn:active { transform: scale(0.9); background: var(--ios-blue); color: white; }

        #lyricsEditor { 
            min-height: 250px; background: var(--ios-secondary); border-radius: 22px; 
            padding: 20px; outline: none; color: var(--ios-text); font-size: 17px;
            line-height: 1.6; border: none;
        }

        /* 하단 탭 바 */
        .bottom-nav {
            position: fixed; bottom: 30px; left: 24px; right: 24px;
            background: rgba(var(--nav-bg, 0, 0, 0), 0.08);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; display: flex; padding: 6px; z-index: 2000;
        }
        body.dark .bottom-nav { --nav-bg: 255, 255, 255; }
        .nav-item { flex: 1; padding: 14px 0; border-radius: 30px; transition: all 0.3s; color: #8E8E93; text-align: center; }
        .nav-item.active { background: var(--ios-card); color: var(--ios-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* 스위치 */
        .apple-switch {
            width: 51px; height: 31px; background: #E9E9EB; border-radius: 31px;
            position: relative; transition: background-color 0.3s; cursor: pointer;
        }
        .apple-switch::before {
            content: ''; position: absolute; width: 27px; height: 27px;
            background: #fff; border-radius: 50%; top: 2px; left: 2px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1); transition: transform 0.3s var(--spring-easing);
        }
        .apple-switch.on { background: #7BE38E; }
        .apple-switch.on::before { transform: translateX(20px); }

        .slide-up {
            position: fixed; inset: 0; background: var(--ios-bg); z-index: 3000;
            transform: translate3d(0, 100%, 0); border-radius: 40px 40px 0 0;
            transition: transform 0.5s var(--spring-easing);
        }
        .slide-up.active { transform: translate3d(0, 44px, 0); }

        .text-heart { color: var(--ios-heart); }
        .tag-jpop { color: #FFADAD; } .tag-kpop { color: #A0C4FF; } .tag-cpop { color: #FFD6A5; }
    </style>
</head>
<body>

    <header class="ios-header">
        <div class="header-content">
            <h1 id="pageTitle" class="text-4xl font-bold tracking-tighter">보관함</h1>
        </div>
        <div id="homeHeaderAddon">
            <div class="px-6 mb-4">
                <div class="flex items-center bg-black/5 dark:bg-white/10 rounded-2xl px-4 py-3">
                    <i class="fas fa-search text-gray-400 mr-3"></i>
                    <input type="text" id="searchInput" oninput="renderList()" placeholder="검색" class="bg-transparent border-none outline-none w-full text-lg">
                </div>
            </div>
            <div class="category-scroll">
                <button onclick="setFilter('FAV')" class="filter-pill"><i class="fas fa-heart mr-1 text-heart"></i>즐겨찾기</button>
                <button onclick="setFilter('ALL')" class="filter-pill active">전체</button>
                <button onclick="setFilter('J-POP')" class="filter-pill">J-POP</button>
                <button onclick="setFilter('K-POP')" class="filter-pill">K-POP</button>
                <button onclick="setFilter('C-POP')" class="filter-pill">C-POP</button>
            </div>
        </div>
    </header>

    <div id="tab-home" class="tab-page active px-6">
        <div id="mainList"></div>
    </div>

    <div id="tab-add" class="tab-page px-6">
        <div class="flex p-1.5 bg-gray-100 dark:bg-white/10 rounded-2xl mb-8">
            <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-3 rounded-xl text-xs font-bold bg-white dark:bg-zinc-800 shadow-sm">J-POP</button>
            <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">K-POP</button>
            <button onclick="setFormGenre('C-POP')" id="btnC" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">C-POP</button>
        </div>
        
        <input type="hidden" id="editingId">
        
        <div class="space-y-4">
            <input type="text" id="inTitle" class="ios-input" placeholder="곡 제목">
            <input type="text" id="inSubTitle" class="ios-input" placeholder="발음/부제">
            <input type="text" id="inArtist" class="ios-input" placeholder="가수명">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="inTJ" class="ios-input" placeholder="TJ 번호">
                <input type="text" id="inKY" class="ios-input" placeholder="금영 번호">
            </div>

            <div class="tool-bar">
                <button onclick="execCmd('bold')" class="tool-btn"><i class="fas fa-bold"></i></button>
                <button onclick="execCmd('foreColor', '#FF8787')" class="tool-btn" style="color:#FF8787"><i class="fas fa-fill-drip"></i></button>
                <button onclick="execCmd('foreColor', '#74B9FF')" class="tool-btn" style="color:#74B9FF"><i class="fas fa-fill-drip"></i></button>
                <button onclick="execCmd('foreColor', '#7BE38E')" class="tool-btn" style="color:#7BE38E"><i class="fas fa-fill-drip"></i></button>
                <button onclick="execCmd('foreColor', 'inherit')" class="tool-btn"><i class="fas fa-eraser"></i></button>
            </div>
            
            <div id="lyricsEditor" contenteditable="true" placeholder="가사를 입력하세요..."></div>
            
            <button onclick="saveSong()" id="saveBtn" class="w-full py-5 bg-black dark:bg-white dark:text-black text-white rounded-3xl font-bold text-xl active:scale-95 transition-all">등록하기</button>
            <button id="cancelEditBtn" onclick="cancelEditing()" class="hidden w-full py-4 text-gray-400 font-semibold text-center mt-2">수정 취소</button>
        </div>
    </div>

    <div id="tab-more" class="tab-page px-6">
        <div class="space-y-4">
            <div class="ios-input flex justify-between items-center" onclick="toggleDarkMode()">
                <span>다크 모드</span>
                <div id="darkSwitch" class="apple-switch"></div>
            </div>
            <div onclick="exportData()" class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 백업</span><i class="fas fa-download text-blue-300"></i></div>
            <label class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 복구</span><input type="file" onchange="importData(this)" class="hidden"><i class="fas fa-upload text-blue-300"></i></label>
            <div onclick="clearData()" class="ios-input flex justify-between items-center text-red-300 cursor-pointer"><span>전체 데이터 초기화</span><i class="fas fa-trash-alt"></i></div>
            <div class="pt-20 text-center opacity-30 text-[10px] uppercase font-black tracking-widest">Version 5.4.0 UI Unified</div>
        </div>
    </div>

    <div id="lyricPopup" class="slide-up shadow-2xl flex flex-col">
        <div class="w-10 h-1.5 bg-gray-200 rounded-full mx-auto mt-4 mb-4" onclick="closeLyrics()"></div>
        <header class="px-8 py-4 flex justify-between items-center">
            <div class="flex-1 overflow-hidden">
                <h3 id="popTitle" class="font-bold text-2xl truncate"></h3>
                <p id="popArtist" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <div class="flex gap-5">
                <button id="popEditBtn" class="text-gray-400 text-xl"><i class="fas fa-edit"></i></button>
                <button id="popFavBtn" class="text-2xl"><i class="fas fa-heart"></i></button>
            </div>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto px-8 py-6 text-xl leading-relaxed tracking-tight rich-content"></div>
        <div class="px-8 pt-6 pb-14 bg-gray-50/50 dark:bg-white/5 flex gap-5">
            <div class="flex-1 text-center border-r dark:border-white/10"><span class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">TJ Media</span><span id="popTJ" class="text-2xl font-black italic"></span></div>
            <div class="flex-1 text-center"><span class="block text-[10px] font-bold text-gray-400 mb-1 uppercase">Kumyoung</span><span id="popKY" class="text-2xl font-black italic"></span></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)"><i class="fas fa-house"></i></div>
        <div class="nav-item" onclick="switchTab('add', this)"><i class="fas fa-plus"></i></div>
        <div class="nav-item" onclick="switchTab('more', this)"><i class="fas fa-gear"></i></div>
    </nav>

    <script>
        let songs = JSON.parse(localStorage.getItem('karaoke_v5_data')) || [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';
        let isDarkMode = localStorage.getItem('dark_mode') === 'true';

        function initDarkMode() {
            if (isDarkMode) {
                document.body.classList.add('dark');
                document.getElementById('darkSwitch').classList.add('on');
            }
        }
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark');
            document.getElementById('darkSwitch').classList.toggle('on');
            localStorage.setItem('dark_mode', isDarkMode);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');

            const titleMap = { 'home': '보관함', 'add': '노래 등록', 'more': '설정' };
            document.getElementById('pageTitle').innerText = titleMap[tabId];
            document.getElementById('homeHeaderAddon').style.display = (tabId === 'home') ? 'block' : 'none';

            if(tabId === 'home') renderList();
            if(tabId !== 'add') cancelEditing();
            window.scrollTo(0,0);
        }

        function setFormGenre(g) {
            formGenre = g;
            ['btnJ', 'btnK', 'btnC'].forEach(id => document.getElementById(id).className = 'flex-1 py-3 rounded-xl text-xs font-bold text-gray-400');
            const target = g === 'J-POP' ? 'btnJ' : (g === 'K-POP' ? 'btnK' : 'btnC');
            document.getElementById(target).className = 'flex-1 py-3 rounded-xl text-xs font-bold bg-white dark:bg-zinc-800 shadow-sm';
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            const editId = document.getElementById('editingId').value;
            if(!title || !artist) return alert('제목과 가수를 입력해주세요.');

            const data = {
                id: editId ? parseInt(editId) : Date.now(),
                genre: formGenre, title, sub: document.getElementById('inSubTitle').value,
                artist, tj: document.getElementById('inTJ').value || '-', ky: document.getElementById('inKY').value || '-',
                lyrics: document.getElementById('lyricsEditor').innerHTML,
                fav: editId ? songs.find(s => s.id === parseInt(editId)).fav : false
            };

            if(editId) songs[songs.findIndex(s => s.id === data.id)] = data;
            else songs.unshift(data);

            localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
            location.reload();
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });

            container.innerHTML = filtered.length ? '' : '<div class="text-center py-40 opacity-20 font-bold italic">데이터가 없습니다</div>';
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = 'song-card shadow-sm';
                card.onclick = () => showLyrics(s.id);
                const genreClass = s.genre === 'J-POP' ? 'tag-jpop' : (s.genre === 'K-POP' ? 'tag-kpop' : 'tag-cpop');
                card.innerHTML = `
                    <div class="overflow-hidden pr-4">
                        <div class="flex items-center gap-1.5">
                            ${s.fav ? '<i class="fas fa-heart text-heart text-[10px]"></i>' : ''}
                            <h4 class="font-bold text-xl tracking-tight truncate">${s.title}</h4>
                        </div>
                        <p class="text-xs text-gray-500 mt-1 truncate">${s.sub ? s.sub + ' · ' : ''}${s.artist}</p>
                        <span class="${genreClass} text-[9px] font-bold uppercase tracking-wider">${s.genre}</span>
                    </div>
                    <div class="shrink-0 text-right opacity-80">
                        <div class="text-[11px] font-black italic text-red-300">${s.tj}</div>
                        <div class="text-[11px] font-black italic text-green-300">${s.ky}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-pill').forEach(btn => {
                const isMatch = (f === 'ALL' && btn.innerText === '전체') || (f === 'FAV' && btn.innerText.includes('즐겨찾기')) || btn.innerText === f;
                btn.className = `filter-pill shrink-0 px-5 py-2 rounded-full text-sm font-semibold ${isMatch ? 'active' : ''}`;
            });
            renderList();
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} • ${song.genre}`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics;
            const favBtn = document.getElementById('popFavBtn');
            favBtn.style.color = song.fav ? '#FF8787' : '#E5E5EA';
            favBtn.onclick = () => { song.fav = !song.fav; localStorage.setItem('karaoke_v5_data', JSON.stringify(songs)); showLyrics(id); };
            
            document.getElementById('popEditBtn').onclick = () => {
                closeLyrics(); switchTab('add', document.querySelectorAll('.nav-item')[1]);
                document.getElementById('editingId').value = song.id;
                document.getElementById('inTitle').value = song.title;
                document.getElementById('inSubTitle').value = song.sub;
                document.getElementById('inArtist').value = song.artist;
                document.getElementById('inTJ').value = song.tj;
                document.getElementById('inKY').value = song.ky;
                document.getElementById('lyricsEditor').innerHTML = song.lyrics;
                document.getElementById('cancelEditBtn').classList.remove('hidden');
                document.getElementById('saveBtn').innerText = '수정 완료';
                setFormGenre(song.genre);
            };
            document.getElementById('lyricPopup').classList.add('active');
        }

        function closeLyrics() { document.getElementById('lyricPopup').classList.remove('active'); }
        function cancelEditing() {
            document.getElementById('editingId').value = '';
            document.querySelectorAll('#tab-add .ios-input').forEach(i => i.value = '');
            document.getElementById('lyricsEditor').innerHTML = '';
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('saveBtn').innerText = '등록하기';
        }
        function execCmd(c,v=null) { document.execCommand(c,false,v); }
        function exportData() { const b=new Blob([JSON.stringify(songs)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='karaoke_backup.json'; a.click(); }
        function importData(i) { const r=new FileReader(); r.onload=(e)=>{ songs=JSON.parse(e.target.result); localStorage.setItem('karaoke_v5_data',JSON.stringify(songs)); location.reload(); }; r.readAsText(i.files[0]); }
        function clearData() { if(confirm('모든 데이터를 삭제할까요?')) { localStorage.removeItem('karaoke_v5_data'); location.reload(); } }

        initDarkMode();
        renderList();
    </script>
</body>
</html>
