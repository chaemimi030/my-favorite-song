<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My 노래방</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.thenounproject.com/png/music-app-icon-2849414-512.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --ios-bg: #FFFFFF;
            --ios-header-bg: rgba(255, 255, 255, 0.98);
            --cool-gray-bg: #F2F4F7;
            --cool-gray-dark: #E5E8EB;
            --ios-text: #1C1E21;
            --ios-subtext: #8E96A3;
            --ios-heart: #FF8787;
            --side-padding: 24px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: var(--ios-bg); color: var(--ios-text);
        }

        /* 메인 레이아웃 가이드 */
        .app-shell { height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; }
        
        .tab-content { display: none; height: 100%; overflow: hidden; flex-direction: column; }
        .tab-content.active { display: flex; }

        /* 헤더 */
        .header-section { flex-shrink: 0; background: var(--ios-header-bg); border-bottom: 0.5px solid var(--cool-gray-dark); padding-top: env(safe-area-inset-top); }
        .header-main { padding: 20px var(--side-padding) 10px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 28px; font-weight: 800; }
        .edit-btn { color: #007AFF; font-weight: 600; font-size: 16px; border: none; background: none; cursor: pointer; }

        /* 스크롤 영역 - PC/모바일 리스트 노출 해결 */
        .scroll-body { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px var(--side-padding) 120px; 
            -webkit-overflow-scrolling: touch;
        }

        /* 검색 & 필터 */
        .search-container { padding-bottom: 10px; border-bottom: 0.5px solid var(--cool-gray-dark); margin-bottom: 5px; }
        .search-box { background: var(--cool-gray-bg); border-radius: 12px; padding: 10px 16px; display: flex; align-items: center; margin: 0 var(--side-padding) 12px; }
        .category-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 0 var(--side-padding) 5px; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { flex: 0 0 65px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 16px; font-size: 13px; font-weight: 600; background: var(--cool-gray-bg); color: var(--ios-subtext); border: none; }
        .filter-pill.active { background: var(--ios-text); color: #fff; }

        /* 카드 디자인 */
        .song-card-wrapper { display: flex; align-items: center; margin-bottom: 12px; width: 100%; }
        .song-card { flex: 1; background: var(--cool-gray-bg); border-radius: 20px; padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; min-width: 0; }
        .num-label { font-size: 10px; color: var(--ios-subtext); font-weight: 700; margin-right: 3px; }
        .num-val { font-size: 13px; color: #000; font-weight: 800; font-style: italic; }

        /* 편집 모드 */
        .delete-checkbox { width: 0; height: 24px; opacity: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .edit-mode .delete-checkbox { width: 40px; opacity: 1; margin-right: 10px; border: 2px solid var(--cool-gray-dark); border-radius: 50%; }
        .delete-checkbox.checked { background: #FF3B30; border-color: #FF3B30; color: white; }

        /* 입력 폼 */
        .ios-input { background: var(--cool-gray-bg); border-radius: 14px; padding: 16px; width: 100%; outline: none; border: none; font-size: 16px; margin-bottom: 10px; }
        .pro-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
        .tool-btn { background: #fff; border: 1px solid var(--cool-gray-dark); border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #lyricsEditor { 
            height: 280px; background: var(--cool-gray-bg); border-radius: 18px; padding: 20px; 
            outline: none; font-size: 14px !important; line-height: 1.6; overflow-y: auto;
        }

        /* 하단 내비게이션 - 여백 및 위치 문제 해결 */
        .nav-holder { position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; padding: 10px 24px calc(15px + env(safe-area-inset-bottom)); background: linear-gradient(transparent, #fff 50%); pointer-events: none; }
        .bottom-nav { background: #1C1E21; border-radius: 24px; display: flex; padding: 6px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .nav-item { flex: 1; padding: 14px 0; text-align: center; color: #777; border-radius: 20px; font-size: 18px; cursor: pointer; }
        .nav-item.active { background: #fff; color: #000; }

        /* 가사 팝업 - 스크롤 간섭 해결 */
        .slide-up { position: fixed; inset: 0; background: #fff; z-index: 3000; transform: translate3d(0, 100%, 0); border-radius: 30px 30px 0 0; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up.active { transform: translate3d(0, 44px, 0); }
        #popContent { font-size: 15px !important; line-height: 1.8; white-space: pre-wrap; word-break: break-all; -webkit-overflow-scrolling: touch; }
        .popup-handle-area { width: 100%; padding-top: 12px; padding-bottom: 10px; cursor: grab; }
        .popup-handle { width: 40px; height: 5px; background: #E5E5EA; border-radius: 10px; margin: 0 auto; }

        #toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 14px; z-index: 4000; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body onload="initApp()">

    <div id="toast">복사 완료!</div>

    <div class="app-shell">
        <section id="tab-home" class="tab-content active">
            <header class="header-section">
                <div class="header-main">
                    <h1 class="header-title">MY 노래방</h1>
                    <button id="main-edit-toggle" onclick="toggleEditMode()" class="edit-btn">편집</button>
                </div>
                <div class="search-container">
                    <div class="search-box">
                        <i class="fas fa-search text-gray-400 mr-2"></i>
                        <input type="text" id="searchInput" oninput="renderList()" placeholder="제목, 가수 검색" class="bg-transparent border-none outline-none w-full">
                    </div>
                    <div class="category-scroll">
                        <button onclick="setFilter('FAV')" id="pill-FAV" class="filter-pill"><i class="fas fa-heart text-[var(--ios-heart)]"></i></button>
                        <button onclick="setFilter('ALL')" id="pill-ALL" class="filter-pill active">전체</button>
                        <button onclick="setFilter('J-POP')" id="pill-J-POP" class="filter-pill">J-POP</button>
                        <button onclick="setFilter('K-POP')" id="pill-K-POP" class="filter-pill">K-POP</button>
                        <button onclick="setFilter('ETC')" id="pill-ETC" class="filter-pill">기타</button>
                    </div>
                </div>
            </header>
            <div class="scroll-body" id="mainList"></div>
        </section>

        <section id="tab-add" class="tab-content">
            <header class="header-section">
                <div class="header-main"><h1 id="add-page-title" class="header-title">곡 추가</h1></div>
            </header>
            <div class="scroll-body">
                <div class="flex p-1 bg-[#F0F2F5] rounded-2xl mb-6">
                    <button onclick="setFormGenre('J-POP')" id="btnJ" class="flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm">J-POP</button>
                    <button onclick="setFormGenre('K-POP')" id="btnK" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">K-POP</button>
                    <button onclick="setFormGenre('ETC')" id="btnE" class="flex-1 py-3 rounded-xl text-xs font-bold text-gray-400">기타</button>
                </div>
                <input type="hidden" id="editingId">
                <input type="text" id="inTitle" class="ios-input" placeholder="제목">
                <input type="text" id="inSubTitle" class="ios-input" placeholder="발음 또는 부제">
                <input type="text" id="inArtist" class="ios-input" placeholder="가수명">
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <input type="text" id="inTJ" class="ios-input" placeholder="TJ 번호">
                    <input type="text" id="inKY" class="ios-input" placeholder="KY 번호">
                </div>
                <div class="pro-toolbar">
                    <button onmousedown="event.preventDefault(); execCmd('bold')" class="tool-btn"><i class="fas fa-bold"></i></button>
                    <button onmousedown="event.preventDefault(); execCmd('foreColor', '#FF8787')" class="tool-btn"><div class="w-5 h-5 rounded bg-[#FF8787]"></div></button>
                    <button onmousedown="event.preventDefault(); execCmd('hiliteColor', '#FEF08A')" class="tool-btn"><i class="fas fa-highlighter text-[#EAB308]"></i></button>
                    <button onmousedown="event.preventDefault(); execCmd('removeFormat')" class="tool-btn"><i class="fas fa-eraser"></i></button>
                </div>
                <div id="lyricsEditor" contenteditable="true" placeholder="가사를 입력하세요..."></div>
                <button onclick="saveSong()" id="saveBtn" class="w-full py-5 bg-[#1C1E21] text-white rounded-3xl font-bold text-xl mt-6">저장하기</button>
                <button id="cancelEditBtn" onclick="resetAllStates(); switchTab('home', 0);" class="hidden w-full py-4 text-gray-400 mt-2 font-bold">취소</button>
            </div>
        </section>

        <section id="tab-more" class="tab-content">
            <header class="header-section">
                <div class="header-main"><h1 class="header-title">설정</h1></div>
            </header>
            <div class="scroll-body space-y-3">
                <div onclick="exportData()" class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 백업</span><i class="fas fa-download text-blue-400"></i></div>
                <label class="ios-input flex justify-between items-center cursor-pointer"><span>데이터 복구</span><input type="file" onchange="importData(this)" class="hidden"><i class="fas fa-upload text-blue-400"></i></label>
                <div onclick="clearData()" class="ios-input flex justify-between items-center text-red-400 cursor-pointer"><span>모든 데이터 초기화</span><i class="fas fa-trash-alt"></i></div>
                <div class="pt-20 text-center opacity-20 text-[10px] font-bold uppercase tracking-widest">v10.7 Swipe Fixed</div>
            </div>
        </section>
    </div>

    <div class="nav-holder">
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home', 0)"><i class="fas fa-house"></i></div>
            <div class="nav-item" onclick="switchTab('add', 1)"><i class="fas fa-plus"></i></div>
            <div class="nav-item" onclick="switchTab('more', 2)"><i class="fas fa-gear"></i></div>
        </nav>
    </div>

    <div id="lyricPopup" class="slide-up flex flex-col">
        <div class="popup-handle-area" id="popHandle">
            <div class="popup-handle"></div>
        </div>
        <header class="px-8 py-2 flex justify-between items-center shrink-0">
            <div class="flex-1 overflow-hidden">
                <h3 id="popTitle" class="font-bold text-2xl truncate"></h3>
                <p id="popArtist" class="text-sm text-gray-400 mt-1"></p>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="copyAndSelectAll()" class="text-gray-400 text-xl border-none bg-none"><i class="fas fa-copy"></i></button>
                <button id="popEditBtn" class="text-gray-400 text-xl border-none bg-none"><i class="fas fa-pen"></i></button>
                <button id="popFavBtn" class="text-2xl border-none bg-none"><i class="fas fa-heart"></i></button>
            </div>
        </header>
        <div id="popContent" class="flex-1 overflow-y-auto px-8 py-6"></div>
        <div class="px-8 py-6 bg-gray-50 flex gap-4 pb-24 shrink-0">
            <div class="flex-1 text-center"><span class="num-label">TJ</span><span id="popTJ" class="num-val"></span></div>
            <div class="flex-1 text-center border-l"><span class="num-label">KY</span><span id="popKY" class="num-val"></span></div>
        </div>
    </div>

    <script>
        let songs = [];
        let currentFilter = 'ALL';
        let formGenre = 'J-POP';
        let isEditMode = false;
        let selectedIds = new Set();

        function initApp() {
            songs = JSON.parse(localStorage.getItem('karaoke_v5_data')) || [];
            renderList();
            setupSwipeToClose();
        }

        function switchTab(tabId, idx) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(tabId !== 'add' || !document.getElementById('editingId').value) resetAllStates();
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
            if(tabId === 'home') renderList();
        }

        function resetAllStates() {
            document.getElementById('searchInput').value = '';
            currentFilter = 'ALL';
            if(isEditMode) toggleEditMode();
            document.getElementById('editingId').value = '';
            document.querySelectorAll('#tab-add input[type="text"]').forEach(i => i.value = '');
            document.getElementById('lyricsEditor').innerHTML = '';
            document.getElementById('add-page-title').innerText = "곡 추가";
            document.getElementById('saveBtn').innerText = "저장하기";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            setFormGenre('J-POP');
            document.getElementById('lyricPopup').classList.remove('active');
        }

        function renderList() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const container = document.getElementById('mainList');
            const filtered = songs.filter(s => {
                const match = s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query);
                if(currentFilter === 'ALL') return match;
                if(currentFilter === 'FAV') return match && s.fav;
                return match && s.genre === currentFilter;
            });
            container.innerHTML = filtered.length ? '' : '<div class="text-center py-20 opacity-20 font-bold italic">결과가 없습니다.</div>';
            filtered.forEach(s => {
                const wrapper = document.createElement('div');
                wrapper.className = 'song-card-wrapper' + (isEditMode ? ' edit-mode' : '');
                wrapper.innerHTML = `<div class="delete-checkbox ${selectedIds.has(s.id)?'checked':''}" onclick="handleCardClick(${s.id})">${selectedIds.has(s.id)?'<i class="fas fa-check"></i>':''}</div><div class="song-card" onclick="handleCardClick(${s.id})"><div class="flex-1 overflow-hidden pr-4 min-w-0"><div class="flex items-center gap-1.5">${s.fav?'<i class="fas fa-heart text-[var(--ios-heart)] text-[10px]"></i>':''}<h4 class="font-bold text-lg truncate">${s.title}</h4></div><p class="text-xs text-gray-400 mt-1 truncate">${s.artist} ${s.sub?'• '+s.sub:''}</p></div><div class="shrink-0 text-right"><div><span class="num-label">TJ</span><span class="num-val">${s.tj}</span></div><div><span class="num-label">KY</span><span class="num-val">${s.ky}</span></div></div></div>`;
                container.appendChild(wrapper);
            });
        }

        function showLyrics(id) {
            const song = songs.find(s => s.id === id);
            document.getElementById('popTitle').innerText = song.title;
            document.getElementById('popArtist').innerText = `${song.artist} • ${song.genre}`;
            document.getElementById('popTJ').innerText = song.tj;
            document.getElementById('popKY').innerText = song.ky;
            document.getElementById('popContent').innerHTML = song.lyrics || '가사가 없습니다.';
            const fBtn = document.getElementById('popFavBtn');
            fBtn.style.color = song.fav ? '#FF8787' : '#E5E5EA';
            fBtn.onclick = () => { song.fav = !song.fav; localStorage.setItem('karaoke_v5_data', JSON.stringify(songs)); showLyrics(id); renderList(); };
            document.getElementById('popEditBtn').onclick = () => {
                document.getElementById('lyricPopup').classList.remove('active');
                switchTab('add', 1);
                document.getElementById('editingId').value = song.id;
                document.getElementById('inTitle').value = song.title;
                document.getElementById('inSubTitle').value = song.sub || '';
                document.getElementById('inArtist').value = song.artist;
                document.getElementById('inTJ').value = song.tj;
                document.getElementById('inKY').value = song.ky;
                document.getElementById('lyricsEditor').innerHTML = song.lyrics;
                document.getElementById('add-page-title').innerText = "곡 수정";
                document.getElementById('saveBtn').innerText = "수정 완료";
                document.getElementById('cancelEditBtn').classList.remove('hidden');
                setFormGenre(song.genre);
            };
            document.getElementById('lyricPopup').classList.add('active');
        }

        // [중요] 스와이프 닫기 로직 개선 - 가사 스크롤과 충돌 방지
        function setupSwipeToClose() {
            let startY = 0;
            const popup = document.getElementById('lyricPopup');
            const handle = document.getElementById('popHandle');
            const content = document.getElementById('popContent');

            // 핸들 부분 터치 시에만 닫기 제스처 활성화 제안 (혹은 전체 영역에서 하되 스크롤 상태 체크)
            popup.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            }, { passive: true });

            popup.addEventListener('touchend', (e) => {
                const endY = e.changedTouches[0].clientY;
                const distance = endY - startY;
                
                // 가사창이 맨 위에 있고(scrollTop === 0), 아래로 80px 이상 명확히 쓸어내릴 때만 닫기
                if (content.scrollTop <= 0 && distance > 80) {
                    popup.classList.remove('active');
                }
            }, { passive: true });
        }

        async function copyAndSelectAll() {
            const content = document.getElementById('popContent');
            const range = document.createRange();
            range.selectNodeContents(content);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            try { await navigator.clipboard.writeText(content.innerText); } catch (e) { document.execCommand('copy'); }
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function saveSong() {
            const title = document.getElementById('inTitle').value.trim();
            const artist = document.getElementById('inArtist').value.trim();
            if(!title || !artist) return alert('제목과 가수는 필수입니다.');
            const editId = document.getElementById('editingId').value;
            const data = {
                id: editId ? parseInt(editId) : Date.now(),
                genre: formGenre, title, sub: document.getElementById('inSubTitle').value,
                artist, tj: document.getElementById('inTJ').value || '-', ky: document.getElementById('inKY').value || '-',
                lyrics: document.getElementById('lyricsEditor').innerHTML,
                fav: editId ? songs.find(s => s.id === parseInt(editId)).fav : false
            };
            if(editId) songs[songs.findIndex(s => s.id === data.id)] = data;
            else songs.unshift(data);
            localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
            resetAllStates();
            switchTab('home', 0);
        }

        function setFormGenre(g) {
            formGenre = g;
            ['btnJ', 'btnK', 'btnE'].forEach(id => document.getElementById(id).className = 'flex-1 py-3 rounded-xl text-xs font-bold text-gray-400');
            const target = g === 'J-POP' ? 'btnJ' : (g === 'K-POP' ? 'btnK' : 'btnE');
            document.getElementById(target).className = 'flex-1 py-3 rounded-xl text-xs font-bold bg-white shadow-sm';
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.toggle('active', btn.id === 'pill-'+f));
            renderList();
        }

        function toggleEditMode() { 
            isEditMode = !isEditMode; 
            if(!isEditMode && selectedIds.size > 0) {
                if(confirm(`${selectedIds.size}개를 삭제할까요?`)) {
                    songs = songs.filter(s => !selectedIds.has(s.id));
                    localStorage.setItem('karaoke_v5_data', JSON.stringify(songs));
                }
            }
            selectedIds.clear(); 
            document.getElementById('main-edit-toggle').innerText = isEditMode ? "삭제/취소" : "편집"; 
            renderList(); 
        }

        function handleCardClick(id) { 
            if(isEditMode) { 
                if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); 
                renderList(); 
            } else showLyrics(id); 
        }

        function execCmd(c,v=null) { document.getElementById('lyricsEditor').focus(); document.execCommand(c, false, v); }
        function exportData() { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(songs)],{type:'application/json'})); a.download='karaoke_backup.json'; a.click(); }
        function importData(i) { const r=new FileReader(); r.onload=(e)=>{ songs=JSON.parse(e.target.result); localStorage.setItem('karaoke_v5_data',JSON.stringify(songs)); location.reload(); }; r.readAsText(i.files[0]); }
        function clearData() { if(confirm('모든 데이터를 초기화할까요?')) { localStorage.removeItem('karaoke_v5_data'); location.reload(); } }
    </script>
</body>
</html>
